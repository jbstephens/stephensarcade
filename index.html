<!DOCTYPE html>
<html lang="en">

<style>
  :root {
    --bg: #0a0e27;
    --panel: #151a36;
    --panel-2: #1d2347;
    --yellow: #ffd23f;
    --cyan: #5fefff;
    --red: #ff4571;
    --green: #5dd66c;
    --magenta: #c45fff;
    --text: #f4f4f4;
    --dim: #6c7099;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Press Start 2P', 'Courier New', monospace;
    overflow: hidden;
    -webkit-font-smoothing: none;
  }
  body {
    display: grid;
    place-items: center;
    padding:
      max(2vmin, env(safe-area-inset-top))
      max(2vmin, env(safe-area-inset-right))
      max(2vmin, env(safe-area-inset-bottom))
      max(2vmin, env(safe-area-inset-left));
    position: relative;
  }
  /* CRT scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.20) 3px,
      rgba(0,0,0,0) 4px
    );
    z-index: 999;
  }
  /* vignette */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    z-index: 998;
  }
  .console {
    width: min(960px, 96vw);
    max-height: 96vh;
    background: var(--panel);
    border: 6px solid var(--yellow);
    box-shadow:
      0 0 0 4px var(--bg),
      0 0 0 10px var(--cyan),
      0 0 60px rgba(95,239,255,0.20);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: relative;
    z-index: 1;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    border-bottom: 4px dashed var(--panel-2);
    padding-bottom: 16px;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .led {
    width: 14px;
    height: 14px;
    background: var(--green);
    box-shadow: 0 0 16px var(--green);
    animation: blink 1.6s infinite;
  }
  @keyframes blink {
    0%, 75% { opacity: 1; }
    76%, 100% { opacity: 0.25; }
  }
  .title {
    font-size: clamp(14px, 2.4vw, 24px);
    color: var(--yellow);
    letter-spacing: 3px;
    text-shadow: 3px 3px 0 var(--red);
    line-height: 1;
  }
  .subtitle {
    font-size: 8px;
    color: var(--cyan);
    margin-top: 8px;
    letter-spacing: 2px;
  }
  .coin {
    font-size: 9px;
    color: var(--dim);
    text-align: right;
    line-height: 1.9;
  }
  .coin .credits { color: var(--yellow); }
  .coin .ready { color: var(--green); animation: blink 1s infinite; }
  .games {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    /* horizontal padding leaves room for the .card.selected ::before arrow
       to render inside the scroll viewport without being clipped */
    padding: 12px 28px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .card {
    background: var(--panel-2);
    border: 4px solid var(--dim);
    padding: 18px 14px;
    cursor: pointer;
    transition: transform 0.08s, border-color 0.08s, box-shadow 0.08s;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    outline: none;
  }
  .card:hover { border-color: var(--text); }
  .card.selected {
    border-color: var(--yellow);
    transform: translate(-2px, -2px);
    box-shadow: 4px 4px 0 var(--red);
  }
  .card.selected::before {
    content: '\25B6';
    position: absolute;
    left: -22px;
    top: 50%;
    color: var(--yellow);
    animation: bounce 0.5s infinite alternate;
    font-size: 14px;
  }
  @keyframes bounce {
    from { transform: translate(0, -50%); }
    to { transform: translate(5px, -50%); }
  }
  .icon {
    width: 96px;
    height: 96px;
    margin: 4px auto 0;
    display: block;
    border: 2px solid #0a0a20;
    box-shadow: 0 0 0 2px var(--dim);
  }
  .card.selected .icon {
    box-shadow: 0 0 0 2px var(--yellow), 0 0 20px rgba(255,210,63,0.35);
  }
  .card-title {
    font-size: 11px;
    color: var(--text);
    letter-spacing: 1px;
  }
  .card-genre {
    font-size: 8px;
    color: var(--cyan);
    letter-spacing: 1px;
  }
  .card-status {
    font-size: 7px;
    color: var(--dim);
    letter-spacing: 1px;
    border-top: 2px dotted var(--dim);
    padding-top: 10px;
  }
  .card.selected .card-status {
    color: var(--yellow);
    animation: blink 0.7s infinite;
  }
  /* Install prompt (iOS Add to Home Screen) */
  .install-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
    font-size: 7px;
    background: transparent;
    border: 2px solid var(--cyan);
    color: var(--cyan);
    padding: 5px 8px;
    margin-top: 8px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.1s, color 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .install-chip:hover, .install-chip:focus-visible {
    background: var(--cyan);
    color: var(--bg);
    outline: none;
  }
  .install-chip[hidden] { display: none !important; }
  #install-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.78);
    z-index: 1000;
    display: grid;
    place-items: center;
    padding: 4vmin;
    -webkit-backdrop-filter: blur(6px);
    backdrop-filter: blur(6px);
  }
  #install-overlay[hidden] { display: none; }
  .install-card {
    background: var(--panel);
    border: 4px solid var(--yellow);
    box-shadow:
      0 0 0 2px var(--bg),
      0 0 0 6px var(--red),
      6px 6px 0 rgba(0,0,0,0.5);
    padding: 28px 22px;
    max-width: 420px;
    width: 100%;
    text-align: center;
  }
  .install-title {
    font-size: 13px;
    color: var(--yellow);
    letter-spacing: 2px;
    text-shadow: 2px 2px 0 var(--red);
    line-height: 1.2;
  }
  .install-sub {
    font-size: 8px;
    color: var(--cyan);
    letter-spacing: 1px;
    margin: 12px 0 22px;
  }
  .install-steps {
    list-style: none;
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin: 0 0 22px 0;
    padding: 0;
  }
  .install-steps li {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 8px;
    letter-spacing: 1px;
    color: var(--text);
    line-height: 1.4;
  }
  .step-num {
    background: var(--yellow);
    color: var(--bg);
    width: 22px;
    height: 22px;
    display: grid;
    place-items: center;
    font-size: 9px;
    flex: 0 0 22px;
  }
  .step-text { flex: 1; }
  .share-icon {
    width: 22px;
    height: 26px;
    flex: 0 0 22px;
  }
  .share-icon path, .share-icon line, .share-icon polyline {
    stroke: var(--cyan);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .addhome-mini {
    font-size: 7px;
    background: var(--panel-2);
    padding: 5px 7px;
    border: 2px solid var(--dim);
    color: var(--cyan);
    letter-spacing: 1px;
    flex: 0 0 auto;
    white-space: nowrap;
  }
  .install-dismiss {
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 2px;
    background: var(--green);
    color: var(--bg);
    border: 4px solid var(--green);
    padding: 12px 22px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .install-dismiss:hover, .install-dismiss:focus-visible {
    background: var(--bg);
    color: var(--green);
    outline: none;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 8px;
    color: var(--dim);
    border-top: 4px dashed var(--panel-2);
    padding-top: 16px;
    letter-spacing: 1px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .hints { display: flex; gap: 18px; flex-wrap: wrap; }
  .key {
    display: inline-block;
    padding: 4px 6px;
    background: var(--panel-2);
    border: 2px solid var(--dim);
    color: var(--text);
    margin-right: 4px;
  }
  @media (max-width: 520px) {
    .console { padding: 16px; gap: 14px; }
    .games {
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      padding: 8px 4px;
    }
    .card { padding: 12px 10px; gap: 8px; }
    .icon { width: 72px; height: 72px; }
    .card-title { font-size: 9px; }
    .card-genre { font-size: 7px; }
    .card-status { font-size: 7px; padding-top: 8px; }
    .hints { display: none; }
    /* the bouncing ▶ arrow is a d-pad affordance; on touch we drop it
       (and reclaim its left padding) */
    .card.selected::before { display: none; }
  }
</style>
</head>
<body>
  <main class="console" aria-label="Game console home screen">
    <div class="header">
      <div class="brand">
        <div class="led" aria-hidden="true"></div>
        <div>
          <div class="title">STEPHENS ARCADE</div>
          <div class="subtitle">8-BIT FAMILY SYSTEM</div>
        </div>
      </div>
      <div class="coin">
        <div>CREDITS <span class="credits">&#8734;</span></div>
        <div><span class="ready">P1 READY</span></div>
        <button type="button" class="install-chip" id="install-chip" hidden>&#9660; ADD TO HOME</button>
      </div>
    </div>

    <div class="games" id="games"></div>

    <div class="footer">
      <div class="hints">
        <span><span class="key">&#9664;</span><span class="key">&#9654;</span> SELECT</span>
        <span><span class="key">&#9166;</span> START</span>
      </div>
      <div>&copy; STEPHENS BROS. &middot; V1.0</div>
    </div>
  </main>

  <div id="install-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="install-title">
    <div class="install-card">
      <div class="install-title" id="install-title">ADD TO HOME SCREEN</div>
      <div class="install-sub">INSTALL STEPHENS ARCADE AS AN APP</div>
      <ol class="install-steps">
        <li>
          <span class="step-num">1</span>
          <span class="step-text">TAP THE SHARE BUTTON IN SAFARI</span>
          <svg class="share-icon" viewBox="0 0 24 28" aria-hidden="true">
            <line x1="12" y1="3" x2="12" y2="17"/>
            <polyline points="6,9 12,3 18,9"/>
            <path d="M5 12 L5 25 L19 25 L19 12"/>
          </svg>
        </li>
        <li>
          <span class="step-num">2</span>
          <span class="step-text">SCROLL DOWN AND TAP</span>
          <span class="addhome-mini">+ ADD TO HOME SCREEN</span>
        </li>
        <li>
          <span class="step-num">3</span>
          <span class="step-text">TAP "ADD" TO PIN THE ARCADE</span>
        </li>
      </ol>
      <button type="button" class="install-dismiss" id="install-dismiss">GOT IT</button>
    </div>
  </div>

<script>
// Tile data lives in games.json (hand-edited source of truth). The bundle
// script generates games.js from it — a tiny shim that sets window.GAMES_DATA
// — and we load it via a <script> tag in <head>. Adding a new game is one
// entry in games.json plus an icon builder below; nothing to touch here.
let GAMES = window.GAMES_DATA || [];

// Icons rendered onto a 180x180 canvas, then cached as data URLs.
// The Phaser Wars icon is ported verbatim from fightinggame.html's
// installAppIcon() so it matches the in-game iPad/home-screen icon.
// The baseball icon uses the same space backdrop + glow language to feel
// like a matching set: a wood bat crossed with a flaming comet baseball.
// The meteor icon goes vertical (rock + rising plume) so its silhouette
// reads as distinct from the two crossed-diagonal compositions. The
// rocket icon inverts it (body up top, exhaust below) so meteor + rocket
// read as a matched pair rather than a duplicate at thumbnail size.
// The quarry icon goes isometric (3D stacked cubes) — a third silhouette
// family that doesn't compete with either the crossed pair or the
// vertical pair.
// The ghost icon is the first character-silhouette in the lineup, with a
// purple glow pulled from Ghost Patrol's own theme color.
const ICON_CACHE = {};

function drawSpaceBackdrop(cx) {
  cx.fillStyle = '#0a0a20';
  cx.fillRect(0, 0, 180, 180);
  const grd = cx.createRadialGradient(90, 90, 30, 90, 90, 135);
  grd.addColorStop(0, '#252560');
  grd.addColorStop(1, '#000');
  cx.fillStyle = grd;
  cx.fillRect(0, 0, 180, 180);
  for (let i = 0; i < 30; i++) {
    cx.fillStyle = `rgba(255,255,255,${0.3 + Math.random() * 0.55})`;
    cx.beginPath();
    cx.arc(Math.random() * 180, Math.random() * 180, Math.random() * 1.4 + 0.4, 0, Math.PI * 2);
    cx.fill();
  }
}

const ICON_BUILDERS = {
  // ported from fightinggame.html — two crossed lightsabers
  phaser(cx) {
    function drawSaber(hx, hy, angle, color, len) {
      cx.save();
      cx.translate(hx, hy);
      cx.rotate(angle);
      // hilt body
      cx.fillStyle = '#bbb';
      cx.fillRect(-12, -9, 22, 18);
      cx.fillStyle = '#444';
      cx.fillRect(-12, -9, 5, 18);
      cx.fillRect(5, -9, 5, 18);
      // activation stud
      cx.fillStyle = '#ffb24d';
      cx.fillRect(-2, -9, 4, 18);
      // blade glow
      cx.shadowBlur = 26; cx.shadowColor = color;
      cx.strokeStyle = color;
      cx.lineWidth = 18; cx.lineCap = 'round';
      cx.beginPath(); cx.moveTo(10, 0); cx.lineTo(len, 0); cx.stroke();
      // hot core
      cx.shadowBlur = 0;
      cx.strokeStyle = '#fff';
      cx.lineWidth = 7;
      cx.beginPath(); cx.moveTo(10, 0); cx.lineTo(len, 0); cx.stroke();
      cx.restore();
    }
    drawSaber(36,  144, -Math.PI / 4,        '#ff5252', 122);
    drawSaber(144, 144, -3 * Math.PI / 4,    '#7fdcff', 122);
  },

  // matching backdrop, same crossed composition: bat ↗ + comet ball ↖
  baseball(cx) {
    function drawBat(hx, hy, angle, len) {
      cx.save();
      cx.translate(hx, hy);
      cx.rotate(angle);
      // knob
      cx.fillStyle = '#5a3018';
      cx.beginPath();
      cx.arc(-6, 0, 10, 0, Math.PI * 2);
      cx.fill();
      // handle wrap (dark grip)
      cx.fillStyle = '#2a1a0a';
      cx.fillRect(0, -7, 30, 14);
      // grip texture
      cx.strokeStyle = 'rgba(0,0,0,0.55)'; cx.lineWidth = 1;
      for (let s = 0; s < 7; s++) {
        cx.beginPath();
        cx.moveTo(2 + s * 4, -7);
        cx.lineTo(2 + s * 4, 7);
        cx.stroke();
      }
      // wood body (tapered)
      const grd = cx.createLinearGradient(0, -13, 0, 13);
      grd.addColorStop(0, '#e0a87a');
      grd.addColorStop(0.45, '#c08050');
      grd.addColorStop(1, '#8a5530');
      cx.fillStyle = grd;
      cx.beginPath();
      cx.moveTo(30, -7);
      cx.lineTo(len - 14, -13);
      cx.quadraticCurveTo(len, -13, len, 0);
      cx.quadraticCurveTo(len, 13, len - 14, 13);
      cx.lineTo(30, 7);
      cx.closePath();
      cx.fill();
      // top edge highlight
      cx.strokeStyle = 'rgba(255,240,210,0.55)';
      cx.lineWidth = 1.5;
      cx.beginPath();
      cx.moveTo(32, -6);
      cx.lineTo(len - 14, -11);
      cx.stroke();
      cx.restore();
    }

    function drawBall(bx, by, r) {
      cx.save();
      cx.translate(bx, by);
      cx.fillStyle = '#fff';
      cx.beginPath(); cx.arc(0, 0, r, 0, Math.PI * 2); cx.fill();
      cx.strokeStyle = '#bbb'; cx.lineWidth = 1.5;
      cx.beginPath(); cx.arc(0, 0, r, 0, Math.PI * 2); cx.stroke();
      // curved stitch arcs
      cx.strokeStyle = '#ff3a3a'; cx.lineWidth = 2;
      cx.beginPath();
      cx.arc(-r * 0.55, 0, r * 1.1, -Math.PI / 3.2, Math.PI / 3.2);
      cx.stroke();
      cx.beginPath();
      cx.arc(r * 0.55, 0, r * 1.1, Math.PI - Math.PI / 3.2, Math.PI + Math.PI / 3.2);
      cx.stroke();
      // stitch tick marks
      cx.fillStyle = '#ff3a3a';
      for (let t = -2; t <= 2; t++) {
        const a = t * 0.28;
        const tr = r * 0.7;
        cx.fillRect(Math.cos(a) * tr - 1.2, Math.sin(a) * tr - 1.2, 2.4, 2.4);
        cx.fillRect(-Math.cos(a) * tr - 1.2, Math.sin(a) * tr - 1.2, 2.4, 2.4);
      }
      cx.restore();
    }

    // bat going up-right (mirrors the red saber position)
    drawBat(36, 144, -Math.PI / 4, 122);
    // ball tucked into the upper-left of the composition
    drawBall(58, 58, 22);
  },

  // vertical fall: pitted rock at the bottom with a glowing plume rising up
  meteor(cx) {
    // plume — three stacked teardrop layers behind the rock (drawn first
    // so the rock paints over the bottom tip).
    function drawPlume(width, length, color, blur) {
      cx.save();
      cx.shadowBlur = blur;
      cx.shadowColor = color;
      cx.fillStyle = color;
      cx.beginPath();
      cx.moveTo(-width, 0);
      cx.quadraticCurveTo(-width * 0.4, -length * 0.55, 0, -length);
      cx.quadraticCurveTo(width * 0.4, -length * 0.55, width, 0);
      cx.quadraticCurveTo(0, width * 0.6, -width, 0);
      cx.closePath();
      cx.fill();
      cx.restore();
    }
    cx.save();
    cx.translate(90, 118);
    drawPlume(30, 108, '#ff5e1a', 30);
    drawPlume(18,  92, '#ffb13a', 22);
    drawPlume(8,   74, '#fff2a8', 0);
    cx.restore();

    // meteor rock — irregular outline so it doesn't read as a ball
    cx.save();
    cx.translate(90, 124);
    cx.shadowBlur = 26;
    cx.shadowColor = '#ff5252';
    cx.fillStyle = '#5a3a26';
    cx.beginPath();
    const pts = [
      [-30,   2], [-26, -16], [-12, -28], [ 8, -30],
      [ 24, -20], [ 32,  -2], [ 28,  18], [ 14,  30],
      [-6,   32], [-22,  24], [-30,  12]
    ];
    cx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) cx.lineTo(pts[i][0], pts[i][1]);
    cx.closePath();
    cx.fill();

    // leading-edge highlight (top face glowing from the plume above)
    cx.shadowBlur = 0;
    cx.fillStyle = '#a87044';
    cx.beginPath();
    cx.moveTo(-26, -16);
    cx.lineTo(-12, -28);
    cx.lineTo(  8, -30);
    cx.lineTo( 24, -20);
    cx.lineTo( 14, -12);
    cx.lineTo( -8, -14);
    cx.closePath();
    cx.fill();

    // craters
    cx.fillStyle = '#2a1810';
    for (const [px, py, r] of [[-10, 6, 5.5], [12, 0, 4], [-16, 18, 3.5], [16, 16, 3]]) {
      cx.beginPath();
      cx.arc(px, py, r, 0, Math.PI * 2);
      cx.fill();
    }
    cx.restore();
  },

  // ascending rocket — body up top, exhaust below. Colors lifted from the
  // game's own favicon (red body, cyan porthole, yellow fins/flame).
  rocket(cx) {
    // exhaust plume below the rocket (drawn first so the rocket body
    // covers the top of the flame)
    function drawFlame(width, length, color, blur) {
      cx.save();
      cx.translate(90, 118);
      cx.shadowBlur = blur;
      cx.shadowColor = color;
      cx.fillStyle = color;
      cx.beginPath();
      cx.moveTo(-width, 0);
      cx.quadraticCurveTo(-width * 0.4, length * 0.55, 0, length);
      cx.quadraticCurveTo(width * 0.4, length * 0.55, width, 0);
      cx.quadraticCurveTo(0, -width * 0.6, -width, 0);
      cx.closePath();
      cx.fill();
      cx.restore();
    }
    drawFlame(24, 56, '#ff5e1a', 28);
    drawFlame(15, 44, '#ffd23f', 18);
    drawFlame( 6, 32, '#fff7c2',  0);

    cx.save();
    cx.translate(90, 90);

    // main body — pointed nose, rounded shoulders, slight taper
    cx.shadowBlur = 24;
    cx.shadowColor = '#ff4571';
    cx.fillStyle = '#ff4571';
    cx.beginPath();
    cx.moveTo(0, -58);
    cx.quadraticCurveTo(24, -36, 24, -10);
    cx.lineTo(24, 26);
    cx.lineTo(-24, 26);
    cx.lineTo(-24, -10);
    cx.quadraticCurveTo(-24, -36, 0, -58);
    cx.closePath();
    cx.fill();

    // left-edge body sheen
    cx.shadowBlur = 0;
    cx.fillStyle = 'rgba(255,210,220,0.55)';
    cx.fillRect(-19, -32, 5, 56);

    // porthole — cyan ring, dark inset, cyan core, white spec
    cx.shadowBlur = 14;
    cx.shadowColor = '#5fefff';
    cx.fillStyle = '#5fefff';
    cx.beginPath();
    cx.arc(0, -8, 12, 0, Math.PI * 2);
    cx.fill();
    cx.shadowBlur = 0;
    cx.fillStyle = '#0a0e27';
    cx.beginPath();
    cx.arc(0, -8, 9, 0, Math.PI * 2);
    cx.fill();
    cx.fillStyle = '#5fefff';
    cx.beginPath();
    cx.arc(0, -8, 5.5, 0, Math.PI * 2);
    cx.fill();
    cx.fillStyle = 'rgba(255,255,255,0.95)';
    cx.beginPath();
    cx.arc(-2.5, -10.5, 2.2, 0, Math.PI * 2);
    cx.fill();

    // fins — yellow triangles flaring from the base
    cx.fillStyle = '#ffd23f';
    cx.beginPath();
    cx.moveTo(-24,   6);
    cx.lineTo(-40,  30);
    cx.lineTo(-24,  30);
    cx.closePath();
    cx.fill();
    cx.beginPath();
    cx.moveTo( 24,   6);
    cx.lineTo( 40,  30);
    cx.lineTo( 24,  30);
    cx.closePath();
    cx.fill();

    // engine bell at the base
    cx.fillStyle = '#2a1a0a';
    cx.fillRect(-10, 26, 20, 6);

    cx.restore();
  },

  // isometric stack of 3 stone cubes in an L-tromino shape (two on the
  // floor, one stacked on the left) — reads as "quarry blocks" without
  // borrowing from any of the existing icons.
  quarry(cx) {
    function drawCube(x, y, s) {
      const w = s * 0.866;
      const h = s * 0.5;
      // top face (rhombus)
      cx.fillStyle = '#8a8aa0';
      cx.beginPath();
      cx.moveTo(x,     y);
      cx.lineTo(x + w, y - h);
      cx.lineTo(x,     y - 2 * h);
      cx.lineTo(x - w, y - h);
      cx.closePath();
      cx.fill();
      // right face (darker than top)
      cx.fillStyle = '#5e5e72';
      cx.beginPath();
      cx.moveTo(x,     y);
      cx.lineTo(x + w, y - h);
      cx.lineTo(x + w, y - h + s);
      cx.lineTo(x,     y + s);
      cx.closePath();
      cx.fill();
      // left face (darkest)
      cx.fillStyle = '#3e3e54';
      cx.beginPath();
      cx.moveTo(x,     y);
      cx.lineTo(x - w, y - h);
      cx.lineTo(x - w, y - h + s);
      cx.lineTo(x,     y + s);
      cx.closePath();
      cx.fill();
      // top-edge highlights (cool cyan-tinted to tie into family glow)
      cx.strokeStyle = 'rgba(180,200,220,0.85)';
      cx.lineWidth = 1.5;
      cx.beginPath();
      cx.moveTo(x - w, y - h);
      cx.lineTo(x,     y - 2 * h);
      cx.lineTo(x + w, y - h);
      cx.stroke();
      cx.beginPath();
      cx.moveTo(x, y - 2 * h);
      cx.lineTo(x, y);
      cx.stroke();
      // stone texture marks on the top face
      cx.fillStyle = '#2a2a36';
      cx.fillRect(x - 5, y - h - 1, 3, 3);
      cx.fillRect(x + 5, y - h * 1.5, 2.5, 2.5);
      cx.fillRect(x - w * 0.5, y - h * 0.7, 2, 2);
    }

    const s = 34;
    const w = s * 0.866;
    const h = s * 0.5;
    // anchor (TF of the bottom-front-left cube)
    const ax = 60, ay = 140;

    // soft cyan glow under the whole stack — ties into the family glow
    cx.save();
    cx.shadowBlur = 26;
    cx.shadowColor = '#5fefff';

    // draw order: back cube first, then front-left cube, then the stacked
    // cube on top — painters' algorithm in iso space.
    drawCube(ax + w,   ay - h, s);   // back-right (floor)
    drawCube(ax,       ay,     s);   // front-left (floor)
    drawCube(ax,       ay - s, s);   // top of front-left

    cx.restore();
  },

  // big centered ghost with a scalloped tail, two eyes, and a small "oh"
  // mouth. Purple glow pulled from Ghost Patrol's own theme color.
  ghost(cx) {
    cx.save();
    cx.translate(90, 92);

    // body — sheet-ghost silhouette
    cx.shadowBlur = 32;
    cx.shadowColor = '#c45fff';
    cx.fillStyle = '#f0f0ff';
    cx.beginPath();
    cx.moveTo(-38, 0);
    // dome head (bezier from left shoulder over the top to right shoulder)
    cx.bezierCurveTo(-38, -56, 38, -56, 38, 0);
    // right side straight down to the bottom waveline
    cx.lineTo(38, 28);
    // 4 scalloped bumps along the bottom (the "tail" of the ghost)
    cx.quadraticCurveTo( 28, 44,  19, 28);
    cx.quadraticCurveTo(  9, 44,   0, 28);
    cx.quadraticCurveTo( -9, 44, -19, 28);
    cx.quadraticCurveTo(-28, 44, -38, 28);
    cx.closePath();
    cx.fill();

    // eyes — black ovals with a small white catchlight
    cx.shadowBlur = 0;
    cx.fillStyle = '#0a0a20';
    cx.beginPath();
    cx.ellipse(-13, -12, 7, 10, 0, 0, Math.PI * 2);
    cx.fill();
    cx.beginPath();
    cx.ellipse( 13, -12, 7, 10, 0, 0, Math.PI * 2);
    cx.fill();
    cx.fillStyle = '#ffffff';
    cx.beginPath();
    cx.arc(-15, -15, 2, 0, Math.PI * 2);
    cx.fill();
    cx.beginPath();
    cx.arc( 11, -15, 2, 0, Math.PI * 2);
    cx.fill();

    // small surprised "oh" mouth
    cx.fillStyle = '#0a0a20';
    cx.beginPath();
    cx.ellipse(0, 8, 5, 7, 0, 0, Math.PI * 2);
    cx.fill();

    cx.restore();
  }
};

// Home-screen icon for iPad / iPhone "Add to Home Screen" and the browser
// tab favicon. Built on the same dark space backdrop as the game tiles so
// the console reads as a matching set: a glowing red ball-top arcade
// joystick on a starfield. Drawn at 180x180 (Apple's recommended size).
(function installAppIcon() {
  const c = document.createElement('canvas');
  c.width = c.height = 180;
  const cx = c.getContext('2d');

  drawSpaceBackdrop(cx);

  // joystick base (dark metal plate with a top highlight and bottom shadow)
  cx.fillStyle = '#222';
  cx.fillRect(38, 130, 104, 24);
  cx.fillStyle = '#3a3a3a';
  cx.fillRect(38, 130, 104, 5);
  cx.fillStyle = '#000';
  cx.fillRect(38, 150, 104, 4);
  // base bolts
  cx.fillStyle = '#888';
  cx.fillRect(46, 140, 4, 4);
  cx.fillRect(130, 140, 4, 4);

  // collar where the stick enters the base
  cx.fillStyle = '#111';
  cx.fillRect(74, 122, 32, 12);
  cx.fillStyle = '#444';
  cx.fillRect(74, 122, 32, 3);

  // stick (silver column with a gradient)
  const stickGrd = cx.createLinearGradient(82, 0, 98, 0);
  stickGrd.addColorStop(0, '#666');
  stickGrd.addColorStop(0.5, '#dcdcdc');
  stickGrd.addColorStop(1, '#666');
  cx.fillStyle = stickGrd;
  cx.fillRect(82, 58, 16, 70);

  // ball top — red, glowing (same shadow language as the saber blade)
  cx.shadowBlur = 32;
  cx.shadowColor = '#ff5252';
  cx.fillStyle = '#ff3a3a';
  cx.beginPath();
  cx.arc(90, 52, 30, 0, Math.PI * 2);
  cx.fill();
  cx.shadowBlur = 0;

  // specular highlights on the ball
  cx.fillStyle = 'rgba(255,255,255,0.55)';
  cx.beginPath();
  cx.arc(80, 42, 8, 0, Math.PI * 2);
  cx.fill();
  cx.fillStyle = 'rgba(255,255,255,0.9)';
  cx.beginPath();
  cx.arc(78, 40, 3, 0, Math.PI * 2);
  cx.fill();

  const url = c.toDataURL('image/png');
  document.querySelectorAll(
    'link[rel="apple-touch-icon"], link[rel="apple-touch-icon-precomposed"], link[rel="icon"]'
  ).forEach(l => l.remove());
  const links = [
    { rel: 'apple-touch-icon',             href: url, sizes: '180x180' },
    { rel: 'apple-touch-icon-precomposed', href: url, sizes: '180x180' },
    { rel: 'icon', type: 'image/png',      href: url, sizes: '180x180' }
  ];
  for (const cfg of links) {
    const link = document.createElement('link');
    Object.entries(cfg).forEach(([k, v]) => link.setAttribute(k, v));
    document.head.appendChild(link);
  }
})();

// Fallback tile art for games that don't have a hand-drawn icon yet — same
// starfield as the rest, with the game's first letter as a chunky glyph.
// Lets new games go live the moment they're added to games.json; the real
// icon can be designed any time after.
function drawDefaultIcon(cx, title) {
  const letter = (title || '?').charAt(0).toUpperCase();
  cx.font = 'bold 110px "Press Start 2P", "Courier New", monospace';
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillStyle = '#ff4571';
  cx.fillText(letter, 94, 96);
  cx.fillStyle = '#ffd23f';
  cx.fillText(letter, 90, 92);
}

function buildIcon(name, title) {
  const key = (name || '') + '|' + (title || '');
  if (ICON_CACHE[key]) return ICON_CACHE[key];
  const c = document.createElement('canvas');
  c.width = c.height = 180;
  const cx = c.getContext('2d');
  drawSpaceBackdrop(cx);
  const fn = ICON_BUILDERS[name];
  if (fn) fn(cx);
  else drawDefaultIcon(cx, title);
  ICON_CACHE[key] = c.toDataURL('image/png');
  return ICON_CACHE[key];
}

let selected = 0;

function render() {
  const grid = document.getElementById('games');
  grid.innerHTML = GAMES.map((g, i) => `
    <div class="card ${i === selected ? 'selected' : ''}" data-i="${i}" tabindex="0" role="button" aria-label="Launch ${g.title}">
      <img class="icon" src="${buildIcon(g.icon, g.title)}" alt="" draggable="false">
      <div class="card-title">${g.title}</div>
      <div class="card-genre">${g.genre}</div>
      <div class="card-status">${g.status}</div>
    </div>
  `).join('');

  grid.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => {
      selected = +el.dataset.i;
      render();
      launch();
    });
    el.addEventListener('mouseenter', () => {
      const i = +el.dataset.i;
      if (i !== selected) {
        selected = i;
        render();
      }
    });
  });
}

function launch() {
  const game = GAMES[selected];
  if (!game) return;
  beep(440, 0.08);
  setTimeout(() => beep(660, 0.08), 80);
  document.body.style.transition = 'opacity 0.25s';
  document.body.style.opacity = '0';
  setTimeout(() => { window.location.href = 'games/' + game.slug + '/'; }, 260);
}

function scrollSelectedIntoView() {
  document.querySelector('.card.selected')
    ?.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

document.addEventListener('keydown', (e) => {
  if (!GAMES.length) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    selected = (selected + 1) % GAMES.length;
    render();
    scrollSelectedIntoView();
    beep(660, 0.05);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    selected = (selected - 1 + GAMES.length) % GAMES.length;
    render();
    scrollSelectedIntoView();
    beep(660, 0.05);
  } else if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    launch();
  }
});

let audioCtx;
function beep(freq, dur) {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square';
    o.frequency.value = freq;
    g.gain.value = 0.05;
    o.connect(g).connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + dur);
  } catch (_) {}
}

render();

// ───── Install / Add-to-Home-Screen prompt ─────
// We can detect when the launcher is *currently running* in standalone mode
// (display-mode: standalone, or iOS-specific navigator.standalone). We cannot
// detect that the user previously installed it but is visiting via Safari —
// so we pair detection with a localStorage dismissal flag set by "GOT IT".
// iOS Safari has no programmatic install prompt; the chip opens an overlay
// with instructions for the Share → Add to Home Screen flow.
(function setupInstallUI() {
  const STORAGE_KEY = 'arcade_install_dismissed';
  const chip = document.getElementById('install-chip');
  const overlay = document.getElementById('install-overlay');
  const dismissBtn = document.getElementById('install-dismiss');
  if (!chip || !overlay || !dismissBtn) return;

  const isStandalone =
    (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) ||
    window.navigator.standalone === true;

  // iPad on modern iOS reports as MacIntel with touch points; cover both.
  const isIOS =
    /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

  let dismissed = false;
  try { dismissed = localStorage.getItem(STORAGE_KEY) === '1'; } catch (_) {}

  if (!isStandalone && !dismissed && isIOS) {
    chip.hidden = false;
  }

  chip.addEventListener('click', () => {
    overlay.hidden = false;
  });
  dismissBtn.addEventListener('click', () => {
    overlay.hidden = true;
    chip.hidden = true;
    try { localStorage.setItem(STORAGE_KEY, '1'); } catch (_) {}
  });
  // Tap the dim backdrop to close without dismissing forever.
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.hidden = true;
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !overlay.hidden) overlay.hidden = true;
  });
})();
</script>
