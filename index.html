<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stephens Arcade">
<meta name="theme-color" content="#0a0e27">
<title>Stephens Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e27;
    --panel: #151a36;
    --panel-2: #1d2347;
    --yellow: #ffd23f;
    --cyan: #5fefff;
    --red: #ff4571;
    --green: #5dd66c;
    --magenta: #c45fff;
    --text: #f4f4f4;
    --dim: #6c7099;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Press Start 2P', 'Courier New', monospace;
    overflow: hidden;
    -webkit-font-smoothing: none;
  }
  body {
    display: grid;
    place-items: center;
    padding: 2vmin;
    position: relative;
  }
  /* CRT scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.20) 3px,
      rgba(0,0,0,0) 4px
    );
    z-index: 999;
  }
  /* vignette */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    z-index: 998;
  }
  .console {
    width: min(960px, 96vw);
    max-height: 96vh;
    background: var(--panel);
    border: 6px solid var(--yellow);
    box-shadow:
      0 0 0 4px var(--bg),
      0 0 0 10px var(--cyan),
      0 0 60px rgba(95,239,255,0.20);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    position: relative;
    z-index: 1;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    border-bottom: 4px dashed var(--panel-2);
    padding-bottom: 16px;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .led {
    width: 14px;
    height: 14px;
    background: var(--green);
    box-shadow: 0 0 16px var(--green);
    animation: blink 1.6s infinite;
  }
  @keyframes blink {
    0%, 75% { opacity: 1; }
    76%, 100% { opacity: 0.25; }
  }
  .title {
    font-size: clamp(14px, 2.4vw, 24px);
    color: var(--yellow);
    letter-spacing: 3px;
    text-shadow: 3px 3px 0 var(--red);
    line-height: 1;
  }
  .subtitle {
    font-size: 8px;
    color: var(--cyan);
    margin-top: 8px;
    letter-spacing: 2px;
  }
  .coin {
    font-size: 9px;
    color: var(--dim);
    text-align: right;
    line-height: 1.9;
  }
  .coin .credits { color: var(--yellow); }
  .coin .ready { color: var(--green); animation: blink 1s infinite; }
  .games {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 12px 8px;
  }
  .card {
    background: var(--panel-2);
    border: 4px solid var(--dim);
    padding: 18px 14px;
    cursor: pointer;
    transition: transform 0.08s, border-color 0.08s, box-shadow 0.08s;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    outline: none;
  }
  .card:hover { border-color: var(--text); }
  .card.selected {
    border-color: var(--yellow);
    transform: translate(-2px, -2px);
    box-shadow: 4px 4px 0 var(--red);
  }
  .card.selected::before {
    content: '\25B6';
    position: absolute;
    left: -22px;
    top: 50%;
    color: var(--yellow);
    animation: bounce 0.5s infinite alternate;
    font-size: 14px;
  }
  @keyframes bounce {
    from { transform: translate(0, -50%); }
    to { transform: translate(5px, -50%); }
  }
  .icon {
    width: 96px;
    height: 96px;
    margin: 4px auto 0;
    display: block;
    border: 2px solid #0a0a20;
    box-shadow: 0 0 0 2px var(--dim);
  }
  .card.selected .icon {
    box-shadow: 0 0 0 2px var(--yellow), 0 0 20px rgba(255,210,63,0.35);
  }
  .card-title {
    font-size: 11px;
    color: var(--text);
    letter-spacing: 1px;
  }
  .card-genre {
    font-size: 8px;
    color: var(--cyan);
    letter-spacing: 1px;
  }
  .card-status {
    font-size: 7px;
    color: var(--dim);
    letter-spacing: 1px;
    border-top: 2px dotted var(--dim);
    padding-top: 10px;
  }
  .card.selected .card-status {
    color: var(--yellow);
    animation: blink 0.7s infinite;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 8px;
    color: var(--dim);
    border-top: 4px dashed var(--panel-2);
    padding-top: 16px;
    letter-spacing: 1px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .hints { display: flex; gap: 18px; flex-wrap: wrap; }
  .key {
    display: inline-block;
    padding: 4px 6px;
    background: var(--panel-2);
    border: 2px solid var(--dim);
    color: var(--text);
    margin-right: 4px;
  }
  @media (max-width: 520px) {
    .console { padding: 16px; }
    .icon { width: 72px; height: 72px; }
    .hints { display: none; }
    .card.selected::before { left: -16px; }
  }
</style>
</head>
<body>
  <main class="console" aria-label="Game console home screen">
    <div class="header">
      <div class="brand">
        <div class="led" aria-hidden="true"></div>
        <div>
          <div class="title">STEPHENS ARCADE</div>
          <div class="subtitle">8-BIT FAMILY SYSTEM</div>
        </div>
      </div>
      <div class="coin">
        <div>CREDITS <span class="credits">&#8734;</span></div>
        <div><span class="ready">P1 READY</span></div>
      </div>
    </div>

    <div class="games" id="games"></div>

    <div class="footer">
      <div class="hints">
        <span><span class="key">&#9664;</span><span class="key">&#9654;</span> SELECT</span>
        <span><span class="key">&#9166;</span> START</span>
      </div>
      <div>&copy; STEPHENS BROS. &middot; V1.0</div>
    </div>
  </main>

<script>
const GAMES = [
  {
    title: 'NINTH INNING',
    genre: 'BASEBALL',
    status: 'PRESS START',
    url: 'https://ninthinning.onrender.com/',
    icon: 'baseball'
  },
  {
    title: 'PHASER WARS',
    genre: 'ACTION',
    status: 'PRESS START',
    url: 'https://phaser-wars.onrender.com/',
    icon: 'phaser'
  }
];

// Icons rendered onto a 180x180 canvas, then cached as data URLs.
// The Phaser Wars icon is ported verbatim from fightinggame.html's
// installAppIcon() so it matches the in-game iPad/home-screen icon.
// The baseball icon uses the same space backdrop + glow language to feel
// like a matching set: a wood bat crossed with a flaming comet baseball.
const ICON_CACHE = {};

function drawSpaceBackdrop(cx) {
  cx.fillStyle = '#0a0a20';
  cx.fillRect(0, 0, 180, 180);
  const grd = cx.createRadialGradient(90, 90, 30, 90, 90, 135);
  grd.addColorStop(0, '#252560');
  grd.addColorStop(1, '#000');
  cx.fillStyle = grd;
  cx.fillRect(0, 0, 180, 180);
  for (let i = 0; i < 30; i++) {
    cx.fillStyle = `rgba(255,255,255,${0.3 + Math.random() * 0.55})`;
    cx.beginPath();
    cx.arc(Math.random() * 180, Math.random() * 180, Math.random() * 1.4 + 0.4, 0, Math.PI * 2);
    cx.fill();
  }
}

const ICON_BUILDERS = {
  // ported from fightinggame.html — two crossed lightsabers
  phaser(cx) {
    function drawSaber(hx, hy, angle, color, len) {
      cx.save();
      cx.translate(hx, hy);
      cx.rotate(angle);
      // hilt body
      cx.fillStyle = '#bbb';
      cx.fillRect(-12, -9, 22, 18);
      cx.fillStyle = '#444';
      cx.fillRect(-12, -9, 5, 18);
      cx.fillRect(5, -9, 5, 18);
      // activation stud
      cx.fillStyle = '#ffb24d';
      cx.fillRect(-2, -9, 4, 18);
      // blade glow
      cx.shadowBlur = 26; cx.shadowColor = color;
      cx.strokeStyle = color;
      cx.lineWidth = 18; cx.lineCap = 'round';
      cx.beginPath(); cx.moveTo(10, 0); cx.lineTo(len, 0); cx.stroke();
      // hot core
      cx.shadowBlur = 0;
      cx.strokeStyle = '#fff';
      cx.lineWidth = 7;
      cx.beginPath(); cx.moveTo(10, 0); cx.lineTo(len, 0); cx.stroke();
      cx.restore();
    }
    drawSaber(36,  144, -Math.PI / 4,        '#ff5252', 122);
    drawSaber(144, 144, -3 * Math.PI / 4,    '#7fdcff', 122);
  },

  // matching backdrop, same crossed composition: bat ↗ + comet ball ↖
  baseball(cx) {
    function drawBat(hx, hy, angle, len) {
      cx.save();
      cx.translate(hx, hy);
      cx.rotate(angle);
      // knob
      cx.fillStyle = '#5a3018';
      cx.beginPath();
      cx.arc(-6, 0, 10, 0, Math.PI * 2);
      cx.fill();
      // handle wrap (dark grip)
      cx.fillStyle = '#2a1a0a';
      cx.fillRect(0, -7, 30, 14);
      // grip texture
      cx.strokeStyle = 'rgba(0,0,0,0.55)'; cx.lineWidth = 1;
      for (let s = 0; s < 7; s++) {
        cx.beginPath();
        cx.moveTo(2 + s * 4, -7);
        cx.lineTo(2 + s * 4, 7);
        cx.stroke();
      }
      // wood body (tapered)
      const grd = cx.createLinearGradient(0, -13, 0, 13);
      grd.addColorStop(0, '#e0a87a');
      grd.addColorStop(0.45, '#c08050');
      grd.addColorStop(1, '#8a5530');
      cx.fillStyle = grd;
      cx.beginPath();
      cx.moveTo(30, -7);
      cx.lineTo(len - 14, -13);
      cx.quadraticCurveTo(len, -13, len, 0);
      cx.quadraticCurveTo(len, 13, len - 14, 13);
      cx.lineTo(30, 7);
      cx.closePath();
      cx.fill();
      // top edge highlight
      cx.strokeStyle = 'rgba(255,240,210,0.55)';
      cx.lineWidth = 1.5;
      cx.beginPath();
      cx.moveTo(32, -6);
      cx.lineTo(len - 14, -11);
      cx.stroke();
      cx.restore();
    }

    function drawBall(bx, by, r) {
      cx.save();
      cx.translate(bx, by);
      cx.fillStyle = '#fff';
      cx.beginPath(); cx.arc(0, 0, r, 0, Math.PI * 2); cx.fill();
      cx.strokeStyle = '#bbb'; cx.lineWidth = 1.5;
      cx.beginPath(); cx.arc(0, 0, r, 0, Math.PI * 2); cx.stroke();
      // curved stitch arcs
      cx.strokeStyle = '#ff3a3a'; cx.lineWidth = 2;
      cx.beginPath();
      cx.arc(-r * 0.55, 0, r * 1.1, -Math.PI / 3.2, Math.PI / 3.2);
      cx.stroke();
      cx.beginPath();
      cx.arc(r * 0.55, 0, r * 1.1, Math.PI - Math.PI / 3.2, Math.PI + Math.PI / 3.2);
      cx.stroke();
      // stitch tick marks
      cx.fillStyle = '#ff3a3a';
      for (let t = -2; t <= 2; t++) {
        const a = t * 0.28;
        const tr = r * 0.7;
        cx.fillRect(Math.cos(a) * tr - 1.2, Math.sin(a) * tr - 1.2, 2.4, 2.4);
        cx.fillRect(-Math.cos(a) * tr - 1.2, Math.sin(a) * tr - 1.2, 2.4, 2.4);
      }
      cx.restore();
    }

    // bat going up-right (mirrors the red saber position)
    drawBat(36, 144, -Math.PI / 4, 122);
    // ball tucked into the upper-left of the composition
    drawBall(58, 58, 22);
  }
};

// Home-screen icon for iPad / iPhone "Add to Home Screen" and the browser
// tab favicon. Built on the same dark space backdrop as the game tiles so
// the console reads as a matching set: a glowing red ball-top arcade
// joystick on a starfield. Drawn at 180x180 (Apple's recommended size).
(function installAppIcon() {
  const c = document.createElement('canvas');
  c.width = c.height = 180;
  const cx = c.getContext('2d');

  drawSpaceBackdrop(cx);

  // joystick base (dark metal plate with a top highlight and bottom shadow)
  cx.fillStyle = '#222';
  cx.fillRect(38, 130, 104, 24);
  cx.fillStyle = '#3a3a3a';
  cx.fillRect(38, 130, 104, 5);
  cx.fillStyle = '#000';
  cx.fillRect(38, 150, 104, 4);
  // base bolts
  cx.fillStyle = '#888';
  cx.fillRect(46, 140, 4, 4);
  cx.fillRect(130, 140, 4, 4);

  // collar where the stick enters the base
  cx.fillStyle = '#111';
  cx.fillRect(74, 122, 32, 12);
  cx.fillStyle = '#444';
  cx.fillRect(74, 122, 32, 3);

  // stick (silver column with a gradient)
  const stickGrd = cx.createLinearGradient(82, 0, 98, 0);
  stickGrd.addColorStop(0, '#666');
  stickGrd.addColorStop(0.5, '#dcdcdc');
  stickGrd.addColorStop(1, '#666');
  cx.fillStyle = stickGrd;
  cx.fillRect(82, 58, 16, 70);

  // ball top — red, glowing (same shadow language as the saber blade)
  cx.shadowBlur = 32;
  cx.shadowColor = '#ff5252';
  cx.fillStyle = '#ff3a3a';
  cx.beginPath();
  cx.arc(90, 52, 30, 0, Math.PI * 2);
  cx.fill();
  cx.shadowBlur = 0;

  // specular highlights on the ball
  cx.fillStyle = 'rgba(255,255,255,0.55)';
  cx.beginPath();
  cx.arc(80, 42, 8, 0, Math.PI * 2);
  cx.fill();
  cx.fillStyle = 'rgba(255,255,255,0.9)';
  cx.beginPath();
  cx.arc(78, 40, 3, 0, Math.PI * 2);
  cx.fill();

  const url = c.toDataURL('image/png');
  document.querySelectorAll(
    'link[rel="apple-touch-icon"], link[rel="apple-touch-icon-precomposed"], link[rel="icon"]'
  ).forEach(l => l.remove());
  const links = [
    { rel: 'apple-touch-icon',             href: url, sizes: '180x180' },
    { rel: 'apple-touch-icon-precomposed', href: url, sizes: '180x180' },
    { rel: 'icon', type: 'image/png',      href: url, sizes: '180x180' }
  ];
  for (const cfg of links) {
    const link = document.createElement('link');
    Object.entries(cfg).forEach(([k, v]) => link.setAttribute(k, v));
    document.head.appendChild(link);
  }
})();

function buildIcon(name) {
  if (ICON_CACHE[name]) return ICON_CACHE[name];
  const c = document.createElement('canvas');
  c.width = c.height = 180;
  const cx = c.getContext('2d');
  drawSpaceBackdrop(cx);
  const fn = ICON_BUILDERS[name];
  if (fn) fn(cx);
  ICON_CACHE[name] = c.toDataURL('image/png');
  return ICON_CACHE[name];
}

let selected = 0;

function render() {
  const grid = document.getElementById('games');
  grid.innerHTML = GAMES.map((g, i) => `
    <div class="card ${i === selected ? 'selected' : ''}" data-i="${i}" tabindex="0" role="button" aria-label="Launch ${g.title}">
      <img class="icon" src="${buildIcon(g.icon)}" alt="" draggable="false">
      <div class="card-title">${g.title}</div>
      <div class="card-genre">${g.genre}</div>
      <div class="card-status">${g.status}</div>
    </div>
  `).join('');

  grid.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => {
      selected = +el.dataset.i;
      render();
      launch();
    });
    el.addEventListener('mouseenter', () => {
      const i = +el.dataset.i;
      if (i !== selected) {
        selected = i;
        render();
      }
    });
  });
}

function launch() {
  const game = GAMES[selected];
  if (!game) return;
  beep(440, 0.08);
  setTimeout(() => beep(660, 0.08), 80);
  document.body.style.transition = 'opacity 0.25s';
  document.body.style.opacity = '0';
  setTimeout(() => { window.location.href = game.url; }, 260);
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    e.preventDefault();
    selected = (selected + 1) % GAMES.length;
    render();
    beep(660, 0.05);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    e.preventDefault();
    selected = (selected - 1 + GAMES.length) % GAMES.length;
    render();
    beep(660, 0.05);
  } else if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    launch();
  }
});

let audioCtx;
function beep(freq, dur) {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square';
    o.frequency.value = freq;
    g.gain.value = 0.05;
    o.connect(g).connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + dur);
  } catch (_) {}
}

render();
</script>
</body>
</html>
