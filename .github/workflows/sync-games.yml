name: Sync games from Render

# Re-bundles each game from its live Render deployment every 30 minutes and
# commits any diff back to main. Means kid ships a game update → Render
# auto-deploys → within 30 min the arcade picks it up automatically.
#
# Also exposes a "Run workflow" button in the Actions tab for on-demand runs.

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min, UTC. GitHub may delay by a few min.
  workflow_dispatch:         # manual trigger from the Actions tab

permissions:
  contents: write            # needed so the bot can push commits back to main

concurrency:
  group: sync-games
  cancel-in-progress: false  # let an in-flight sync finish before another starts

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Re-bundle games from Render
        run: ./scripts/bundle-games.sh

      - name: Commit and push if anything changed
        run: |
          if [ -z "$(git status --porcelain games)" ]; then
            echo "No game changes — nothing to do."
            exit 0
          fi
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add games/
          changed=$(git diff --cached --name-only | sed 's|games/||; s|/index.html||' | paste -sd', ' -)
          git commit -m "Auto-sync: ${changed}"
          git push
