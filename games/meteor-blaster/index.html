<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meteor Blaster">
<title>Meteor Blaster</title>
<style>
  * {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", system-ui, sans-serif;
    color: #fff;
    touch-action: none;
  }
  #game { position: fixed; inset: 0; display: block; }

  /* On-screen controls (iPad FamiCom-style D-pad + action button) — same
     CSS pattern as Phaser Wars: chunky semi-transparent circular buttons
     pinned to the safe-area corners, only shown on touch devices in-match. */
  .controls {
    position: fixed; top: 0; bottom: 0;
    display: none; flex-direction: column;
    justify-content: flex-end;
    padding: max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    gap: 12px;
    z-index: 5; pointer-events: none;
  }
  body.touch.in-match .controls { display: flex; }
  body.paused .controls { display: none; }
  .controls.left  { left: 0;  align-items: flex-start; }
  .controls.right { right: 0; align-items: flex-end;   }
  .row { display: flex; gap: 12px; pointer-events: auto; align-items: center; justify-content: center; }
  .btn {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 3px solid rgba(255,255,255,0.35);
    color: #fff; font-size: 26px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    pointer-events: auto;
    transition: transform 0.06s, background 0.06s;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  /* Primary action — big FIRE button, in the pilot's bolt colour. */
  .btn.fire {
    width: 104px; height: 104px;
    font-size: 18px; letter-spacing: 2px; font-weight: 900;
    background: rgba(127,220,255,0.22);
    border-color: rgba(127,220,255,0.7);
    color: #7fdcff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
  }
  .btn.fire.held { background: rgba(127,220,255,0.5); }
  /* Secondary action — smaller BOMB button, sits beside FIRE like Phaser
     Wars' switch button sits beside attack. */
  .btn.bomb {
    width: 64px; height: 64px;
    font-size: 11px; letter-spacing: 1.5px; font-weight: 900;
    background: rgba(255,180,77,0.22);
    border-color: rgba(255,180,77,0.7);
    color: #ffe066;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
  }
  .btn.bomb.held  { background: rgba(255,180,77,0.5); }
  .btn.bomb.empty { opacity: 0.35; }
  .btn.held       { background: rgba(255,255,255,0.4); transform: scale(0.93); }

  /* D-pad layout — column with three rows (up, left+right, down) so it
     reads as a + shape, just like a NES/Famicom controller. */
  .dpad { display: flex; flex-direction: column; gap: 8px; pointer-events: auto; align-items: center; }
  .dpad .row { gap: 8px; }
  .dpad .spacer { width: 64px; height: 64px; pointer-events: none; }

  /* Pause button — top-right, kid-finger friendly */
  .hud-btn {
    position: fixed;
    top: max(12px, env(safe-area-inset-top));
    right: max(12px, env(safe-area-inset-right));
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.55);
    color: #fff;
    font-size: 24px;
    font-weight: 700;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 6;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    font-family: inherit;
    touch-action: manipulation;
  }
  body.in-match .hud-btn { display: flex; }
  body.paused   .hud-btn { display: none; }
  .hud-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.35); }

  .overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.78);
    text-align: center; padding: 20px;
    z-index: 10; overflow-y: auto;
  }
  .overlay h1 {
    font-size: clamp(32px, 6vw, 56px);
    letter-spacing: 3px;
    margin-bottom: 6px;
    text-shadow: 0 3px 12px rgba(95,239,255,0.35);
  }
  .overlay .sub { font-size: clamp(14px, 2.2vw, 20px); opacity: 0.85; margin-bottom: 18px; letter-spacing: 1px; }
  .overlay .help { font-size: clamp(12px, 1.7vw, 15px); line-height: 1.6; opacity: 0.85; margin-bottom: 18px; max-width: 560px; }
  .overlay button {
    font-size: clamp(18px, 2.6vw, 24px); padding: 14px 28px;
    border-radius: 12px; border: none; background: #fff; color: #000;
    font-weight: 800; letter-spacing: 1px; cursor: pointer; margin: 6px;
    touch-action: manipulation;
  }
  .overlay button.secondary {
    background: transparent; color: #fff;
    border: 2px solid rgba(255,255,255,0.55);
    font-size: clamp(14px, 2vw, 18px); padding: 10px 22px;
  }
  .overlay button:active { transform: scale(0.97); }
  .hidden { display: none !important; }

  .pilots {
    display: flex; gap: 14px; flex-wrap: wrap;
    justify-content: center; margin-bottom: 18px;
  }
  .pilot-card {
    width: clamp(96px, 17vw, 130px);
    aspect-ratio: 1 / 1.15;
    border-radius: 16px;
    background: var(--c);
    color: #fff;
    border: 4px solid transparent;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding: 10px 6px 14px;
    font-family: inherit;
    position: relative;
    overflow: hidden;
    transition: transform 0.1s, border-color 0.1s;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    touch-action: manipulation;
  }
  .pilot-card:active { transform: scale(0.96); }
  .pilot-card.selected { border-color: #fff; transform: scale(1.05); }
  .pilot-card .face {
    width: 48%; aspect-ratio: 1;
    background: var(--skin);
    border-radius: 50%;
    margin-bottom: 8px;
    border-top: 8px solid rgba(0,0,0,0.55);
    position: relative;
    z-index: 2;
  }
  .pilot-card .face::before, .pilot-card .face::after {
    content:''; position: absolute; top: 45%; width: 8%; aspect-ratio: 1;
    background: #222; border-radius: 50%;
  }
  .pilot-card .face::before { left: 30%; }
  .pilot-card .face::after  { right: 30%; }
  .pilot-card .card-hair { display: none; }
  .pilot-card[data-hair="long"] .face { border-top-color: transparent; }
  .pilot-card[data-hair="long"] .card-hair {
    display: block;
    position: absolute;
    width: 62%; height: 56%;
    top: 8%; left: 19%;
    background: var(--hair);
    border-radius: 50% 50% 40% 40% / 55% 55% 45% 45%;
    z-index: 1;
  }
  .pilot-card[data-hair="long"] .card-hair::after {
    content: '';
    position: absolute;
    top: 28%; left: 8%;
    width: 84%; height: 22%;
    background: var(--hair);
    border-radius: 50% 50% 40% 40% / 80% 80% 30% 30%;
    transform: rotate(-6deg);
  }
  .pilot-card .name {
    font-weight: 900;
    font-size: clamp(15px, 2.2vw, 20px);
    letter-spacing: 2px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.5);
    z-index: 3;
  }
  .pilot-card .hi {
    position: absolute;
    top: 6px; right: 8px;
    font-size: 11px; font-weight: 800;
    background: #ffe066; color: #000;
    padding: 2px 8px;
    border-radius: 99px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    z-index: 4;
    letter-spacing: 1px;
  }
  .label {
    font-size: clamp(15px, 2.4vw, 20px);
    font-weight: 800;
    letter-spacing: 3px;
    margin-bottom: 14px;
    color: #7fdcff;
  }
</style>

<body>
<canvas id="game"></canvas>

<button id="pauseBtn" class="hud-btn" aria-label="Pause">II</button>

<!-- iPad on-screen controls — D-pad on the left, BOMB action on the right.
     Same chunky NES/Famicom-style buttons used by the family fighting game. -->
<div class="controls left">
  <div class="dpad">
    <div class="row"><div class="btn" data-act="up"    aria-label="Up">&#9650;</div></div>
    <div class="row">
      <div class="btn" data-act="left"  aria-label="Left">&#9664;</div>
      <div class="spacer"></div>
      <div class="btn" data-act="right" aria-label="Right">&#9654;</div>
    </div>
    <div class="row"><div class="btn" data-act="down"  aria-label="Down">&#9660;</div></div>
  </div>
</div>
<div class="controls right">
  <div class="row">
    <div class="btn bomb" id="bombBtn" data-act="bomb" aria-label="Bomb">BOMB</div>
    <div class="btn fire" id="fireBtn" data-act="fire" aria-label="Fire">FIRE</div>
  </div>
</div>

<!-- Title / pilot select -->
<div id="titleOverlay" class="overlay">
  <h1>METEOR BLASTER</h1>
  <div class="sub">PICK YOUR PILOT</div>
  <div class="pilots" id="pilots"></div>
  <div class="help">
    Steer your ship and blast the falling rocks.<br>
    Survive 5 waves to face <b>ZORG</b>.
  </div>
  <button id="startBtn">START</button>
</div>

<!-- Pause -->
<div id="pauseOverlay" class="overlay hidden">
  <h1>PAUSED</h1>
  <button id="resumeBtn">RESUME</button>
  <button id="quitBtn" class="secondary">QUIT TO TITLE</button>
</div>

<!-- Game over / victory -->
<div id="endOverlay" class="overlay hidden">
  <h1 id="endTitle">GAME OVER</h1>
  <div class="sub" id="endSub">FINAL SCORE: 0</div>
  <div id="endHi" class="sub" style="opacity:0.7;letter-spacing:2px;"></div>
  <button id="againBtn">PLAY AGAIN</button>
  <button id="endQuitBtn" class="secondary">CHANGE PILOT</button>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // Logical resolution — same shape as fightinggame; ship moves in 2D
  const VW = 800, VH = 450;

  let scale = 1, offX = 0, offY = 0;
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const w = window.innerWidth, h = window.innerHeight;
    canvas.width  = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    scale = Math.min(canvas.width / VW, canvas.height / VH);
    offX = (canvas.width - VW * scale) / 2;
    offY = (canvas.height - VH * scale) / 2;
  }
  window.addEventListener('resize', resize);
  resize();

  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if (isTouch) document.body.classList.add('touch');

  // ───── home-screen icon (canvas → data URI) ─────
  // Same dark space backdrop as the rest of the family arcade. A glowing
  // orange meteor crossed by a blue laser bolt — matches the saber/comet
  // composition language of the existing tiles.
  (function installAppIcon() {
    const c = document.createElement('canvas');
    c.width = c.height = 180;
    const cx = c.getContext('2d');

    cx.fillStyle = '#0a0a20';
    cx.fillRect(0, 0, 180, 180);
    const grd = cx.createRadialGradient(90, 90, 30, 90, 90, 135);
    grd.addColorStop(0, '#252560');
    grd.addColorStop(1, '#000');
    cx.fillStyle = grd;
    cx.fillRect(0, 0, 180, 180);

    for (let i = 0; i < 30; i++) {
      cx.fillStyle = `rgba(255,255,255,${0.3 + Math.random() * 0.55})`;
      cx.beginPath();
      cx.arc(Math.random() * 180, Math.random() * 180, Math.random() * 1.4 + 0.4, 0, Math.PI * 2);
      cx.fill();
    }

    // Meteor with fiery trail (going down-right)
    cx.save();
    cx.shadowBlur = 30; cx.shadowColor = '#ff8030';
    cx.strokeStyle = 'rgba(255,140,40,0.7)';
    cx.lineWidth = 18; cx.lineCap = 'round';
    cx.beginPath();
    cx.moveTo(36, 36); cx.lineTo(110, 110);
    cx.stroke();
    cx.shadowBlur = 0;
    cx.fillStyle = '#aa3300';
    cx.beginPath(); cx.arc(118, 118, 24, 0, Math.PI * 2); cx.fill();
    cx.fillStyle = '#ff9944';
    cx.beginPath(); cx.arc(112, 112, 12, 0, Math.PI * 2); cx.fill();
    cx.fillStyle = '#fff7d0';
    cx.beginPath(); cx.arc(108, 108, 5, 0, Math.PI * 2); cx.fill();
    cx.restore();

    // Player ship blaster bolt rising from bottom-left
    cx.save();
    cx.shadowBlur = 24; cx.shadowColor = '#7fdcff';
    cx.strokeStyle = '#7fdcff'; cx.lineWidth = 8; cx.lineCap = 'round';
    cx.beginPath();
    cx.moveTo(40, 150); cx.lineTo(72, 90);
    cx.stroke();
    cx.shadowBlur = 0;
    cx.strokeStyle = '#fff'; cx.lineWidth = 3;
    cx.beginPath();
    cx.moveTo(40, 150); cx.lineTo(72, 90);
    cx.stroke();
    cx.restore();

    const url = c.toDataURL('image/png');
    document.querySelectorAll('link[rel="apple-touch-icon"], link[rel="apple-touch-icon-precomposed"], link[rel="icon"]').forEach(l => l.remove());
    const links = [
      { rel: 'apple-touch-icon',              href: url, sizes: '180x180' },
      { rel: 'apple-touch-icon-precomposed',  href: url, sizes: '180x180' },
      { rel: 'icon', type: 'image/png',       href: url, sizes: '180x180' },
    ];
    for (const cfg of links) {
      const link = document.createElement('link');
      Object.entries(cfg).forEach(([k, v]) => link.setAttribute(k, v));
      document.head.appendChild(link);
    }
  })();

  // ───── pilot roster (matches family-game look from Phaser Wars) ─────
  const PILOTS = {
    ben:  { id:'ben',  name:'BEN',  color:'#3aa0ff', boltColor:'#7fdcff', skinColor:'#f3d0a8', hair:'short',
            voice:{ pitch:1.7, rate:1.25, taunts:["Got it!","Take that!","Boom!","Got you!"] } },
    luke: { id:'luke', name:'LUKE', color:'#ff5252', boltColor:'#ff8a8a', skinColor:'#e8b988', hair:'short',
            voice:{ pitch:1.8, rate:1.35, taunts:["Hahaha!","Booyah!","Pow!","Owned!"] } },
    mom:  { id:'mom',  name:'MOM',  color:'#ff6bb3', boltColor:'#ffc1e0', skinColor:'#f5d6b3', hair:'long', hairColor:'#a8336e',
            voice:{ pitch:1.3, rate:1.05, taunts:["Yes!","Got 'em!","Easy!","Nailed it!"] } },
    dad:  { id:'dad',  name:'DAD',  color:'#4caf50', boltColor:'#b0ff90', skinColor:'#e3b388', hair:'short',
            voice:{ pitch:0.7, rate:0.95, taunts:["Booyah!","Oh yeah!","Got 'em!","Champion!"] } },
  };
  const PILOT_ORDER = ['ben', 'luke', 'mom', 'dad'];

  // ───── persistent high scores per pilot ─────
  const HISCORE_KEY = 'meteorBlaster.hi.v1';
  function loadHi() {
    try { return JSON.parse(localStorage.getItem(HISCORE_KEY)) || {}; } catch { return {}; }
  }
  function saveHi(hi) {
    try { localStorage.setItem(HISCORE_KEY, JSON.stringify(hi)); } catch {}
  }
  let hiscores = loadHi();

  // ───── audio core (synthesized, no assets) ─────
  let audioCtx;
  function ensureAudio() {
    if (!audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function blip(freq, dur, type='square', vol=0.07, sweepTo=null) {
    if (!audioCtx) return;
    const t0 = audioCtx.currentTime;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t0);
    if (sweepTo != null) o.frequency.exponentialRampToValueAtTime(sweepTo, t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start(t0); o.stop(t0 + dur);
  }
  function noiseBurst(durSec, peakGain, lpStart, lpEnd) {
    if (!audioCtx) return;
    const t0 = audioCtx.currentTime;
    const sr = audioCtx.sampleRate;
    const buf = audioCtx.createBuffer(1, Math.floor(sr * durSec), sr);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length * 0.6);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.setValueAtTime(lpStart, t0);
    filt.frequency.exponentialRampToValueAtTime(lpEnd, t0 + durSec);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(peakGain, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + durSec);
    src.connect(filt).connect(g).connect(audioCtx.destination);
    src.start(t0); src.stop(t0 + durSec + 0.05);
  }
  const sfx = {
    shot:      () => blip(880, 0.08, 'square',   0.05, 1400),
    bigShot:   () => blip(540, 0.12, 'sawtooth', 0.07, 1800),
    hit:       () => blip(180, 0.07, 'square',   0.07, 90),
    boom:      () => { noiseBurst(0.30, 0.24, 2200, 160); blip(140, 0.25, 'sawtooth', 0.13, 40); },
    smallBoom: () => { noiseBurst(0.16, 0.14, 1800, 240); blip(220, 0.16, 'sawtooth', 0.08, 80); },
    pickup:    () => { [660,880,1320,1760].forEach((f,i)=>setTimeout(()=>blip(f,0.08,'triangle',0.06),i*55)); },
    shield:    () => { [330,440,660].forEach((f,i)=>setTimeout(()=>blip(f,0.16,'sine',0.05),i*55)); },
    bomb:      () => {
      noiseBurst(0.55, 0.30, 2600, 80);
      blip(110, 0.55, 'sawtooth', 0.18, 30);
      setTimeout(()=>blip(440, 0.35, 'square', 0.10, 90), 60);
    },
    death:     () => {
      if (!audioCtx) return;
      const t0 = audioCtx.currentTime;
      const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(280, t0);
      o.frequency.exponentialRampToValueAtTime(40, t0 + 1.1);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(0.28, t0 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 1.2);
      o.connect(g).connect(audioCtx.destination);
      o.start(t0); o.stop(t0 + 1.25);
      noiseBurst(0.6, 0.22, 2200, 100);
    },
    warn:      () => { blip(900, 0.08, 'square', 0.05); setTimeout(()=>blip(900, 0.08, 'square', 0.05), 200); },
    waveStart: () => { blip(660, 0.14, 'triangle', 0.08, 990); setTimeout(()=>blip(990, 0.18, 'triangle', 0.08, 1320), 90); },
    bossAppear:() => {
      noiseBurst(0.8, 0.28, 3200, 80);
      [110,82,55].forEach((f,i)=>setTimeout(()=>blip(f, 0.45, 'sawtooth', 0.18, f*0.7), i*180));
    },
  };

  // Voice via SpeechSynthesis — same approach as Phaser Wars
  function speakVoice(pilotId, line) {
    if (!('speechSynthesis' in window)) return;
    const f = PILOTS[pilotId];
    if (!f || !f.voice) return;
    try {
      const text = line || f.voice.taunts[Math.floor(Math.random() * f.voice.taunts.length)];
      const u = new SpeechSynthesisUtterance(text);
      u.pitch = f.voice.pitch;
      u.rate  = f.voice.rate;
      u.volume = 0.9;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
    } catch {}
  }

  // ───── parallax starfield ─────
  const STAR_LAYERS = [
    { parallax: 0.20, stars: [], color: '#bcd0ff', count: 80, sizeMin: 0.3, sizeMax: 0.9, alphaMin: 0.30, alphaMax: 0.70 },
    { parallax: 0.55, stars: [], color: '#ffffff', count: 50, sizeMin: 0.5, sizeMax: 1.3, alphaMin: 0.40, alphaMax: 0.85 },
    { parallax: 1.10, stars: [], color: '#fff7cf', count: 26, sizeMin: 0.8, sizeMax: 1.8, alphaMin: 0.50, alphaMax: 0.95 },
  ];
  for (const layer of STAR_LAYERS) {
    for (let i = 0; i < layer.count; i++) {
      layer.stars.push({
        x: Math.random() * VW,
        y: Math.random() * VH,
        r: layer.sizeMin + Math.random() * (layer.sizeMax - layer.sizeMin),
        a: layer.alphaMin + Math.random() * (layer.alphaMax - layer.alphaMin),
      });
    }
  }
  let starScrollT = 0;
  function drawStars() {
    for (const layer of STAR_LAYERS) {
      ctx.fillStyle = layer.color;
      for (const s of layer.stars) {
        // stars scroll downward at parallax-dependent speed
        const y = (s.y + starScrollT * layer.parallax) % VH;
        ctx.globalAlpha = s.a;
        ctx.beginPath();
        ctx.arc(s.x, y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
  }

  // distant planet drifting in the bg — same palette as the space arena
  function drawPlanets() {
    const t = starScrollT * 0.05;
    ctx.save();
    ctx.shadowBlur = 14; ctx.shadowColor = '#8a4a2c';
    ctx.fillStyle = '#8a4a2c';
    ctx.beginPath(); ctx.arc(150, (110 + t) % (VH + 80) - 40, 36, 0, Math.PI * 2); ctx.fill();
    ctx.shadowColor = '#4a8a6c'; ctx.fillStyle = '#4a8a6c';
    ctx.beginPath(); ctx.arc(620, (90 + t * 1.6) % (VH + 80) - 40, 26, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // ───── game state ─────
  const MENU = 'menu', PLAYING = 'playing', WAVE_BANNER = 'wave', BOSS = 'boss', PAUSED = 'paused', DEAD = 'dead', VICTORY = 'victory';
  let state = MENU;

  let pilotId = 'ben';
  let player = null;
  // Initialize collections at declaration so the render loop is safe to call
  // before resetGame() runs (the title screen draws stars/planets while the
  // user is choosing a pilot, and would otherwise iterate over undefined).
  let bullets = [], enemyBullets = [], meteors = [], ufos = [];
  let kamikazes = [], turrets = [], wingmen = [], bgComets = [];
  let powerups = [], explosions = [], particles = [], floatingTexts = [];
  let zorg = null, miniBoss = null;
  let wave = 0, score = 0, lives = 3, bombs = 2, scoreFlash = 0;
  let waveTimer = 0, waveSpawnAcc = 0, waveSpawnInterval = 60, meteorsThisWave = 0, meteorsRemaining = 0;
  let kamikazeAcc = 0, turretAcc = 0;
  let bannerText = '', bannerSub = '', bannerTime = 0;
  let shake = 0;
  // Combo / scoring system. Every kill inside COMBO_WINDOW frames stacks
  // the multiplier; SpeechSynthesis calls out milestones.
  let combo = 0, comboTimer = 0, maxCombo = 0;
  const COMBO_WINDOW = 110;
  // Active set-piece events
  let meteorShowerT = 0;
  let damageThisWave = 0;
  // Frame-level slow-mo multiplier (0..1). 1 = normal. Set by SLOW-MO power-up.
  let enemySpeed = 1;
  // Hit-pause: skip enemy updates for a few frames on a big kill — adds weight.
  let hitPauseT = 0;
  const TOTAL_WAVES = 7;
  const MIDBOSS_WAVE = 4;

  function freshPlayer() {
    return {
      x: VW / 2,
      y: VH - 60,
      r: 16,
      vx: 0, vy: 0,
      cooldown: 0,
      power: 1,            // 1 = single, 2 = spread x3, 3 = spread x5
      powerTime: 0,        // frames remaining of power-up
      shieldTime: 0,
      laserTime: 0,        // continuous beam mode
      homingTime: 0,       // shots curve toward enemies
      magnetTime: 0,       // power-up crates fly toward you
      slowTime: 0,         // bullet-time on enemies
      wingmenTime: 0,      // two escort ships co-fire
      invuln: 0,           // post-respawn invulnerability frames
      flash: 0,
      thruster: 0,
    };
  }

  function resetGame() {
    player = freshPlayer();
    bullets = []; enemyBullets = []; meteors = []; ufos = [];
    kamikazes = []; turrets = []; wingmen = []; bgComets = [];
    powerups = []; explosions = []; particles = []; floatingTexts = [];
    zorg = null; miniBoss = null;
    wave = 0;
    score = 0;
    lives = 3;
    bombs = 4;
    scoreFlash = 0;
    shake = 0;
    combo = 0; comboTimer = 0; maxCombo = 0;
    meteorShowerT = 0;
    damageThisWave = 0;
    enemySpeed = 1;
    hitPauseT = 0;
  }

  // ───── waves ─────
  // Difficulty ramps from soft into chaos. New enemy types unlock per wave
  // so the family sees something new every round. Wave 4 is the Mothership
  // mini-boss, wave 7 is ZORG.
  const WAVES = [
    // 1: meteor basics
    { count: 14, interval: 58, ufoEvery: 0,  iceChance: 0.0,  bigChance: 0.0,  meteorVy: 1.6, kamikazeEvery: 0,  turretEvery: 0,  splitterChance: 0.0,  showerChance: 0.0,  desc: 'METEOR FIELD' },
    // 2: + ice + occasional splitter
    { count: 18, interval: 52, ufoEvery: 0,  iceChance: 0.15, bigChance: 0.05, meteorVy: 1.8, kamikazeEvery: 0,  turretEvery: 0,  splitterChance: 0.10, showerChance: 0.0,  desc: 'ICE STORM' },
    // 3: + UFOs + first kamikaze swarm
    { count: 22, interval: 46, ufoEvery: 8,  iceChance: 0.18, bigChance: 0.10, meteorVy: 2.0, kamikazeEvery: 16, turretEvery: 0,  splitterChance: 0.15, showerChance: 0.003, desc: 'ENEMY CONTACT' },
    // 4: MOTHERSHIP mini-boss
    { boss: 'mini', desc: 'MOTHERSHIP' },
    // 5: + turret asteroids
    { count: 24, interval: 42, ufoEvery: 7,  iceChance: 0.20, bigChance: 0.14, meteorVy: 2.1, kamikazeEvery: 13, turretEvery: 18, splitterChance: 0.20, showerChance: 0.004, desc: 'GUN BELT' },
    // 6: everything mixed, faster
    { count: 30, interval: 36, ufoEvery: 6,  iceChance: 0.25, bigChance: 0.18, meteorVy: 2.3, kamikazeEvery: 10, turretEvery: 14, splitterChance: 0.22, showerChance: 0.005, desc: 'CHAOS' },
    // 7: ZORG
    { boss: 'zorg', desc: 'ZORG' },
  ];

  function startWave(n) {
    // Wave-clear gift: free bomb every wave you survive (caps at 9), so kids
    // can always count on having one on hand for the mothership / Zorg.
    if (n > 1) {
      bombs = Math.min(9, bombs + 1);
      syncBombBtn();
      floatingTexts.push({
        x: VW / 2, y: VH / 2 + 30, vy: -0.5, time: 60,
        text: '+ BOMB',
        color: '#ffb24d', size: 18,
      });
    }
    // Perfect-wave bonus — only after a non-banner wave that the player
    // actually played through unharmed.
    if (n > 1 && n - 1 <= WAVES.length && !WAVES[n - 2].boss && damageThisWave === 0) {
      addPoints(500, VW / 2, VH / 2, 'PERFECT! +500');
      try {
        if ('speechSynthesis' in window) {
          const u = new SpeechSynthesisUtterance('Perfect!');
          u.pitch = 1.4; u.rate = 1.1; u.volume = 0.9;
          window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
        }
      } catch {}
    }
    damageThisWave = 0;

    wave = n;
    if (n > TOTAL_WAVES) { winGame(); return; }
    const def = WAVES[n - 1];
    if (def.boss === 'mini') {
      spawnMothership();
      bannerText = 'WARNING';
      bannerSub  = 'MOTHERSHIP DETECTED';
      bannerTime = 120;
      state = WAVE_BANNER;
      sfx.bossAppear();
      return;
    }
    if (def.boss === 'zorg') {
      spawnZorg();
      bannerText = 'WARNING';
      bannerSub  = 'ZORG APPROACHES';
      bannerTime = 130;
      state = WAVE_BANNER;
      sfx.bossAppear();
      return;
    }
    meteorsThisWave = def.count;
    meteorsRemaining = def.count;
    waveSpawnInterval = def.interval;
    waveSpawnAcc = 0;
    kamikazeAcc = 0; turretAcc = 0;
    waveTimer = 0;
    bannerText = 'WAVE ' + n;
    bannerSub  = def.desc || 'INCOMING';
    bannerTime = 90;
    state = WAVE_BANNER;
    sfx.waveStart();
  }

  function spawnMeteor(opts = {}) {
    const def = WAVES[wave - 1] || { iceChance: 0.1, bigChance: 0.05, meteorVy: 2.0, splitterChance: 0 };
    // Fragments (from a splitter) are always plain small fast rocks — they
    // shouldn't randomly upgrade to ice/big/splitter again.
    const fragment = !!opts.fragment;
    const isIce      = !fragment && (opts.kind === 'ice' || (opts.kind == null && Math.random() < (def.iceChance || 0)));
    const isBig      = !fragment && !isIce && (opts.big || (opts.kind == null && Math.random() < (def.bigChance || 0)));
    const isSplitter = !fragment && !isIce && !isBig && Math.random() < (def.splitterChance || 0);
    const r = opts.r ?? (isBig ? 30 + Math.random() * 8 : (fragment ? 10 + Math.random() * 3 : 16 + Math.random() * 8));
    const x = opts.x ?? (30 + Math.random() * (VW - 60));
    const y = opts.y ?? -40;
    const vx = opts.vx ?? (Math.random() - 0.5) * 1.2;
    const vy = opts.vy ?? def.meteorVy + Math.random() * 0.8;
    const hp = isBig ? 3 : 1;
    meteors.push({
      x, y, vx, vy, r,
      hp, maxHp: hp,
      kind: isSplitter ? 'splitter' : (isIce ? 'ice' : 'rock'),
      spin: Math.random() * Math.PI * 2,
      spinV: (Math.random() - 0.5) * 0.05,
      big: isBig,
      splitter: isSplitter,
      fragment,
    });
  }

  function spawnKamikaze(opts = {}) {
    kamikazes.push({
      x: opts.x ?? 50 + Math.random() * (VW - 100),
      y: opts.y ?? -30,
      vx: opts.vx ?? (Math.random() - 0.5) * 0.6,
      vy: opts.vy ?? 2.4 + Math.random() * 0.8,
      r: 11,
      hp: 1, maxHp: 1,
      thruster: 0,
    });
  }

  function spawnTurret() {
    turrets.push({
      x: 80 + Math.random() * (VW - 160),
      y: -40,
      vy: 1.4,
      r: 22,
      hp: 4, maxHp: 4,
      phase: 'falling',
      dockY: 90 + Math.random() * 90,
      cooldown: 70 + Math.random() * 50,
      spin: 0,
    });
  }

  function spawnMothership() {
    miniBoss = {
      x: VW / 2,
      y: -60,
      tx: VW / 2,
      ty: 90,
      r: 36,
      hp: 18, maxHp: 18,        // softer than before — was 28
      phase: 'entering',
      moveT: 0,
      dropCooldown: 260,        // first pod takes longer — was 160
      shootCooldown: 150,       // longer warm-up — was 110
      flash: 0,
      moveX: 1,
      halfHpDrop: false,        // drops a care package at 50%
    };
  }

  function spawnUFO() {
    const fromLeft = Math.random() < 0.5;
    ufos.push({
      x: fromLeft ? -30 : VW + 30,
      y: 50 + Math.random() * 80,
      vx: fromLeft ? 1.6 : -1.6,
      vy: 0,
      r: 16,
      hp: 2, maxHp: 2,
      shootCooldown: 70 + Math.random() * 40,
    });
  }

  function spawnZorg() {
    zorg = {
      x: VW / 2,
      y: -80,
      tx: VW / 2,
      ty: 90,
      r: 44,
      hp: 100, maxHp: 100,
      phase: 'entering',
      shootCooldown: 90,
      meteorCooldown: 220,
      moveT: 0,
      flash: 0,
    };
  }

  function spawnPowerup(x, y, kindOverride) {
    // Ten types, weighted. Bombs and shield get bumped weight so kids can
    // stay topped up; the wild ones (laser, slow-mo, wingmen) are rarer
    // reward moments. Life is still rare.
    const pool = [
      ['rapid',   16],
      ['spread',  14],
      ['shield',  14],
      ['bomb',    18],
      ['magnet',   9],
      ['homing',   9],
      ['wingmen',  6],
      ['laser',    5],
      ['slowmo',   5],
      ['life',     4],
    ];
    let kind = kindOverride;
    if (!kind) {
      let total = 0; for (const [, w] of pool) total += w;
      let r = Math.random() * total;
      kind = 'rapid';
      for (const [k, w] of pool) { r -= w; if (r <= 0) { kind = k; break; } }
    }
    powerups.push({ x, y, vx: 0, vy: 1.2, r: 12, rotation: 0, kind });
  }

  function playerFire() {
    if (player.cooldown > 0) return;
    // Laser mode handles its own continuous-beam damage from updateLaser —
    // here we just keep a low cooldown for the beep cadence.
    if (player.laserTime > 0) {
      player.cooldown = 4;
      return;
    }
    const cd = player.powerTime > 0 && player.power >= 2 ? 8 : 12;
    player.cooldown = cd;
    const pc = PILOTS[pilotId].boltColor;
    const fx = player.x, fy = player.y - 14;
    const homing = player.homingTime > 0;
    const mk = (vx, vy) => ({ x: fx, y: fy, vx, vy, r: 4, color: pc, life: homing ? 90 : 60, homing });
    if (player.powerTime > 0 && player.power === 3) {
      const spread = [-0.35, -0.17, 0, 0.17, 0.35];
      for (const a of spread) bullets.push(mk(Math.sin(a) * 8, -10 + Math.cos(a) * -0.5));
    } else if (player.powerTime > 0 && player.power === 2) {
      [-0.22, 0, 0.22].forEach(a => bullets.push(mk(Math.sin(a) * 6, -10)));
    } else {
      bullets.push(mk(0, -10));
    }
    // Wingmen co-fire — each wingman has its own cooldown counter.
    for (const w of wingmen) {
      if (w.cooldown <= 0) {
        const wx = player.x + w.offsetX, wy = player.y + w.offsetY - 12;
        bullets.push({ x: wx, y: wy, vx: 0, vy: -9, r: 3, color: '#ffe066', life: 60, homing: false });
        w.cooldown = 14;
      }
    }
    sfx.shot();
  }

  function detonateBomb() {
    if (bombs <= 0) return;
    bombs--;
    syncBombBtn();
    sfx.bomb();
    shake = Math.max(shake, 20);
    // Big white flash + clear all enemies + chip both bosses
    explosions.push({ x: VW / 2, y: VH / 2, time: 36, max: 36, radius: 800, color: '#fff' });
    for (const m of meteors) {
      explosions.push({ x: m.x, y: m.y, time: 22, max: 22, radius: m.r * 2.5, color: m.kind === 'ice' ? '#aae6ff' : '#ffa050' });
      addPoints(m.big ? 30 : 15, m.x, m.y, m.big ? '+30' : '+15');
      spawnDebris(m.x, m.y, m.kind === 'ice' ? '#aae6ff' : '#ff8040', 12);
    }
    meteors.length = 0;
    for (const u of ufos) {
      explosions.push({ x: u.x, y: u.y, time: 22, max: 22, radius: 40, color: '#aaff60' });
      addPoints(80, u.x, u.y, '+80');
      spawnDebris(u.x, u.y, '#aaff60', 14);
    }
    ufos.length = 0;
    for (const k of kamikazes) {
      explosions.push({ x: k.x, y: k.y, time: 18, max: 18, radius: 28, color: '#c45fff' });
      addPoints(40, k.x, k.y, '+40');
      spawnDebris(k.x, k.y, '#c45fff', 8);
    }
    kamikazes.length = 0;
    for (const t of turrets) {
      explosions.push({ x: t.x, y: t.y, time: 24, max: 24, radius: 40, color: '#ff7a30' });
      addPoints(120, t.x, t.y, '+120');
      spawnDebris(t.x, t.y, '#ff7a30', 14);
    }
    turrets.length = 0;
    enemyBullets.length = 0;
    if (miniBoss && miniBoss.phase === 'fight') {
      miniBoss.hp = Math.max(0, miniBoss.hp - 6);
      miniBoss.flash = 12;
      if (miniBoss.hp <= 0) startMiniBossDeath();
    }
    if (zorg && zorg.phase !== 'dying') {
      zorg.hp = Math.max(0, zorg.hp - 14);
      zorg.flash = 14;
    }
  }

  // Combo multiplier — every kill inside COMBO_WINDOW frames stacks. The
  // multiplier steps up every 3 hits (1x, 2x, 3x, …) capped at 8x. Score
  // popups get progressively flashier colours; SpeechSynthesis announces
  // milestone tiers so it feels like an arcade crowd cheering you on.
  const COMBO_TIERS = [
    { at: 6,  label: 'DOUBLE!',  color: '#ffe066' },
    { at: 10, label: 'TRIPLE!',  color: '#ffce4d' },
    { at: 15, label: 'RAMPAGE!', color: '#ff80b3' },
    { at: 20, label: 'INSANE!',  color: '#ff5252' },
    { at: 30, label: 'GODLIKE!', color: '#c45fff' },
  ];
  let lastComboTier = 0;
  function comboMult() { return Math.min(8, Math.max(1, Math.floor(combo / 3) + 1)); }
  function comboColor() {
    const m = comboMult();
    return m >= 6 ? '#c45fff' : m >= 4 ? '#ff5252' : m >= 3 ? '#ff80b3' : m >= 2 ? '#ffce4d' : '#ffe066';
  }
  function addPoints(p, x, y, label) {
    if (state === PLAYING && p > 0) {
      combo++;
      comboTimer = COMBO_WINDOW;
      if (combo > maxCombo) maxCombo = combo;
    }
    const mult = comboMult();
    const total = Math.floor(p * mult);
    score += total;
    scoreFlash = 14;
    if (x != null) floatingTexts.push({
      x, y: y - 14, vy: -0.8, time: 50,
      text: label || ('+' + total),
      color: comboColor(),
      size: 14 + Math.min(8, mult * 1.2),
    });
    // Milestone announce — speak once per tier per combo run
    for (const t of COMBO_TIERS) {
      if (combo === t.at && lastComboTier < t.at) {
        lastComboTier = t.at;
        floatingTexts.push({ x: VW / 2, y: 80, vy: -0.6, time: 70, text: t.label, color: t.color, size: 26 });
        try {
          if ('speechSynthesis' in window) {
            const u = new SpeechSynthesisUtterance(t.label.replace('!', ''));
            u.pitch = 1.2; u.rate = 1.05; u.volume = 0.9;
            window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
          }
        } catch {}
        break;
      }
    }
  }
  function resetCombo() { combo = 0; comboTimer = 0; lastComboTier = 0; }

  function spawnDebris(x, y, color, count = 8) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 1 + Math.random() * 3;
      particles.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp,
        life: 30 + Math.random() * 20,
        maxLife: 50,
        color,
        size: 2 + Math.random() * 2.5,
      });
    }
  }

  function killPlayer() {
    if (player.invuln > 0 || player.shieldTime > 0) return;
    if (state !== PLAYING && state !== WAVE_BANNER) return;
    explosions.push({ x: player.x, y: player.y, time: 36, max: 36, radius: 70, color: '#fff' });
    spawnDebris(player.x, player.y, PILOTS[pilotId].color, 24);
    sfx.death();
    shake = Math.max(shake, 18);
    damageThisWave++;
    resetCombo();
    wingmen.length = 0;
    lives--;
    if (lives <= 0) {
      state = DEAD;
      setTimeout(showGameOver, 1200);
      return;
    }
    // Brief respawn delay handled by invuln; reset position + all timed buffs
    player.x = VW / 2;
    player.y = VH - 60;
    player.vx = 0; player.vy = 0;
    player.invuln = 120;
    player.power = 1;
    player.powerTime = 0;
    player.shieldTime = 0;
    player.laserTime = 0;
    player.homingTime = 0;
    player.magnetTime = 0;
    player.slowTime = 0;
    player.wingmenTime = 0;
  }

  // ───── input ─────
  const keys = {};
  const touchInput = { up:false, down:false, left:false, right:false, fire:false };
  window.addEventListener('keydown', (e) => {
    if (state === MENU) return;
    keys[e.key.toLowerCase()] = true;
    // Space = fire (held re-fires at the cooldown rate). B = bomb (edge-
    // triggered, ignore key auto-repeat).
    if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); }
    if ((e.key === 'b' || e.key === 'B') && !e.repeat) { if (state === PLAYING) detonateBomb(); }
    if (e.key === 'p' || e.key === 'P' || e.key === 'Escape') togglePause();
  });
  window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

  // D-pad + action buttons — same touchstart/end pattern as Phaser Wars.
  // D-pad and FIRE are held-state. BOMB fires on press only (edge-triggered).
  document.querySelectorAll('.btn').forEach(btn => {
    const act = btn.dataset.act;
    if (!act) return;
    const set = (v) => {
      if (act === 'bomb') {
        if (v && (state === PLAYING || state === WAVE_BANNER)) {
          ensureAudio();
          detonateBomb();
        }
        btn.classList.toggle('held', v);
      } else {
        touchInput[act] = v;
        btn.classList.toggle('held', v);
      }
    };
    const down = (e) => { e.preventDefault(); ensureAudio(); set(true); };
    const up   = (e) => { e.preventDefault(); set(false); };
    btn.addEventListener('touchstart',  down, { passive:false });
    btn.addEventListener('touchend',    up,   { passive:false });
    btn.addEventListener('touchcancel', up,   { passive:false });
    btn.addEventListener('mousedown',   down);
    btn.addEventListener('mouseup',     up);
    btn.addEventListener('mouseleave',  () => set(false));
  });

  // Drag-anywhere on the canvas as a fallback — feels great on iPad but only
  // engages when the player touches the play area (not while using the D-pad).
  let touchTarget = null;
  let dragTouchId = null;
  function canvasToLogical(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const px = (clientX - rect.left) * (canvas.width / rect.width);
    const py = (clientY - rect.top)  * (canvas.height / rect.height);
    return { x: (px - offX) / scale, y: (py - offY) / scale };
  }
  function onCanvasTouchStart(e) {
    if (state !== PLAYING && state !== WAVE_BANNER) return;
    if (dragTouchId !== null) return;
    const t = e.changedTouches[0];
    dragTouchId = t.identifier;
    const p = canvasToLogical(t.clientX, t.clientY);
    touchTarget = { x: p.x, y: Math.max(60, p.y - 50) };
    e.preventDefault();
  }
  function onCanvasTouchMove(e) {
    if (dragTouchId === null) return;
    for (const t of e.changedTouches) {
      if (t.identifier === dragTouchId) {
        const p = canvasToLogical(t.clientX, t.clientY);
        touchTarget.x = p.x;
        touchTarget.y = Math.max(60, p.y - 50);
        e.preventDefault();
        return;
      }
    }
  }
  function onCanvasTouchEnd(e) {
    for (const t of e.changedTouches) {
      if (t.identifier === dragTouchId) { dragTouchId = null; touchTarget = null; return; }
    }
  }
  canvas.addEventListener('touchstart', onCanvasTouchStart, { passive: false });
  canvas.addEventListener('touchmove',  onCanvasTouchMove,  { passive: false });
  canvas.addEventListener('touchend',   onCanvasTouchEnd);
  canvas.addEventListener('touchcancel',onCanvasTouchEnd);

  // Mouse drag on desktop (optional alternative to keyboard)
  let mouseDown = false;
  canvas.addEventListener('mousedown', (e) => {
    if (state !== PLAYING && state !== WAVE_BANNER) return;
    mouseDown = true;
    const p = canvasToLogical(e.clientX, e.clientY);
    touchTarget = { x: p.x, y: p.y };
  });
  canvas.addEventListener('mousemove', (e) => {
    if (!mouseDown) return;
    const p = canvasToLogical(e.clientX, e.clientY);
    touchTarget.x = p.x; touchTarget.y = p.y;
  });
  window.addEventListener('mouseup', () => { mouseDown = false; touchTarget = null; });

  // ───── menu wiring ─────
  const titleOverlay  = document.getElementById('titleOverlay');
  const pauseOverlay  = document.getElementById('pauseOverlay');
  const endOverlay    = document.getElementById('endOverlay');
  const startBtn      = document.getElementById('startBtn');
  const resumeBtn     = document.getElementById('resumeBtn');
  const quitBtn       = document.getElementById('quitBtn');
  const againBtn      = document.getElementById('againBtn');
  const endQuitBtn    = document.getElementById('endQuitBtn');
  const pauseBtn      = document.getElementById('pauseBtn');
  const bombBtn       = document.getElementById('bombBtn');
  const endTitle      = document.getElementById('endTitle');
  const endSub        = document.getElementById('endSub');
  const endHi         = document.getElementById('endHi');

  function renderPilots() {
    const root = document.getElementById('pilots');
    root.innerHTML = '';
    for (const id of PILOT_ORDER) {
      const f = PILOTS[id];
      const hi = hiscores[id] || 0;
      const card = document.createElement('div');
      card.className = 'pilot-card' + (pilotId === id ? ' selected' : '');
      card.style.setProperty('--c', f.color);
      card.style.setProperty('--skin', f.skinColor);
      if (f.hair === 'long') {
        card.setAttribute('data-hair', 'long');
        card.style.setProperty('--hair', f.hairColor || '#5a2a08');
      }
      card.innerHTML = `
        <div class="card-hair"></div>
        <div class="face"></div>
        <div class="name">${f.name}</div>
        ${hi > 0 ? `<div class="hi">HI ${hi}</div>` : ''}
      `;
      card.addEventListener('click', () => {
        ensureAudio();
        pilotId = id;
        renderPilots();
        sfx.shot();
      });
      root.appendChild(card);
    }
  }
  renderPilots();

  function syncBombBtn() {
    bombBtn.textContent = bombs > 0 ? `BOMB ${bombs}` : 'BOMB';
    bombBtn.classList.toggle('empty', bombs <= 0);
  }

  function startGame() {
    ensureAudio();
    resetGame();
    syncBombBtn();
    titleOverlay.classList.add('hidden');
    endOverlay.classList.add('hidden');
    document.body.classList.add('in-match');
    document.body.classList.remove('paused');
    startWave(1);
  }
  startBtn.addEventListener('click', startGame);

  function togglePause() {
    if (state === MENU || state === DEAD || state === VICTORY) return;
    if (state === PAUSED) {
      state = _resumeState || PLAYING;
      _resumeState = null;
      pauseOverlay.classList.add('hidden');
      document.body.classList.remove('paused');
    } else {
      _resumeState = state;
      state = PAUSED;
      pauseOverlay.classList.remove('hidden');
      document.body.classList.add('paused');
    }
  }
  let _resumeState = null;
  pauseBtn.addEventListener('click', togglePause);
  resumeBtn.addEventListener('click', togglePause);
  quitBtn.addEventListener('click', () => {
    state = MENU;
    _resumeState = null;
    pauseOverlay.classList.add('hidden');
    document.body.classList.remove('paused', 'in-match');
    titleOverlay.classList.remove('hidden');
    renderPilots();
  });

  function showGameOver() {
    endTitle.textContent = 'GAME OVER';
    endSub.textContent = 'FINAL SCORE: ' + score;
    recordHi();
    endHi.textContent = `BEST (${PILOTS[pilotId].name}): ${hiscores[pilotId] || 0}`;
    endOverlay.classList.remove('hidden');
    document.body.classList.remove('in-match');
  }
  function winGame() {
    state = VICTORY;
    bannerText = 'ZORG DEFEATED!';
    bannerSub  = `${PILOTS[pilotId].name} SAVED THE GALAXY`;
    bannerTime = 240;
    speakVoice(pilotId, 'Zorg defeated!');
    setTimeout(() => {
      endTitle.textContent = 'VICTORY!';
      endSub.textContent = 'FINAL SCORE: ' + score;
      recordHi();
      endHi.textContent = `BEST (${PILOTS[pilotId].name}): ${hiscores[pilotId] || 0}`;
      endOverlay.classList.remove('hidden');
      document.body.classList.remove('in-match');
    }, 2400);
  }
  function recordHi() {
    if (!hiscores[pilotId] || score > hiscores[pilotId]) {
      hiscores[pilotId] = score;
      saveHi(hiscores);
    }
  }
  againBtn.addEventListener('click', startGame);
  endQuitBtn.addEventListener('click', () => {
    endOverlay.classList.add('hidden');
    document.body.classList.remove('in-match');
    state = MENU;
    titleOverlay.classList.remove('hidden');
    renderPilots();
  });

  // ───── update ─────
  function updatePlayer() {
    const SPEED = 4.6;
    const ACCEL = 0.7;
    const FRICTION = 0.82;
    let tx = 0, ty = 0;

    if (touchTarget) {
      // glide toward drag target (canvas drag)
      const dx = touchTarget.x - player.x;
      const dy = touchTarget.y - player.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 2) {
        const k = Math.min(1, dist / 60);
        tx = (dx / dist) * SPEED * k;
        ty = (dy / dist) * SPEED * k;
      }
      player.vx = tx; player.vy = ty;
    } else {
      // D-pad and keyboard share input — D-pad inputs map straight to keys
      const left  = keys['arrowleft']  || keys['a'] || touchInput.left;
      const right = keys['arrowright'] || keys['d'] || touchInput.right;
      const up    = keys['arrowup']    || keys['w'] || touchInput.up;
      const down  = keys['arrowdown']  || keys['s'] || touchInput.down;
      if (left)  player.vx -= ACCEL;
      if (right) player.vx += ACCEL;
      if (up)    player.vy -= ACCEL;
      if (down)  player.vy += ACCEL;
      player.vx = Math.max(-SPEED, Math.min(SPEED, player.vx));
      player.vy = Math.max(-SPEED, Math.min(SPEED, player.vy));
      if (!left && !right) player.vx *= FRICTION;
      if (!up   && !down)  player.vy *= FRICTION;
    }

    player.x += player.vx;
    player.y += player.vy;
    player.x = Math.max(20, Math.min(VW - 20, player.x));
    player.y = Math.max(40, Math.min(VH - 30, player.y));

    if (player.cooldown > 0) player.cooldown--;
    if (player.powerTime > 0) {
      player.powerTime--;
      if (player.powerTime === 0) player.power = 1;
    }
    if (player.shieldTime > 0)  player.shieldTime--;
    if (player.laserTime > 0)   player.laserTime--;
    if (player.homingTime > 0)  player.homingTime--;
    if (player.magnetTime > 0)  player.magnetTime--;
    if (player.slowTime > 0)    player.slowTime--;
    if (player.wingmenTime > 0) {
      player.wingmenTime--;
      if (player.wingmenTime === 0) wingmen.length = 0;
    }
    if (player.invuln > 0) player.invuln--;
    if (player.flash > 0) player.flash--;
    player.thruster = (player.thruster + 1) % 6;
    // Slow-mo affects enemies, not the player.
    enemySpeed = player.slowTime > 0 ? 0.35 : 1;

    // Update wingmen positions (follow player with smoothing) and cooldowns
    for (const w of wingmen) {
      if (w.cooldown > 0) w.cooldown--;
    }

    // Manual fire — hold or mash. playerFire() enforces the cooldown.
    if (keys[' '] || keys['spacebar'] || touchInput.fire) playerFire();
  }

  function nearestTargetTo(x, y) {
    let best = null, bestD = Infinity;
    function consider(t) {
      const dx = t.x - x, dy = t.y - y;
      const d = dx * dx + dy * dy;
      if (d < bestD) { bestD = d; best = t; }
    }
    for (const m of meteors)  consider(m);
    for (const u of ufos)     consider(u);
    for (const k of kamikazes) consider(k);
    for (const t of turrets)  if (t.phase !== 'falling') consider(t);
    if (miniBoss && miniBoss.phase !== 'dying') consider(miniBoss);
    if (zorg && zorg.phase !== 'dying')         consider(zorg);
    return best;
  }

  function updateBullets() {
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      // Homing bullets steer toward the nearest target, capped speed
      if (b.homing) {
        const t = nearestTargetTo(b.x, b.y);
        if (t) {
          const dx = t.x - b.x, dy = t.y - b.y;
          const d = Math.max(1, Math.hypot(dx, dy));
          const turn = 0.35;
          b.vx += (dx / d) * turn;
          b.vy += (dy / d) * turn;
          const sp = Math.hypot(b.vx, b.vy);
          const max = 11;
          if (sp > max) { b.vx = b.vx / sp * max; b.vy = b.vy / sp * max; }
        }
      }
      b.x += b.vx; b.y += b.vy;
      b.life--;
      if (b.life <= 0 || b.y < -20 || b.y > VH + 20 || b.x < -20 || b.x > VW + 20) bullets.splice(i, 1);
    }
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const b = enemyBullets[i];
      b.x += b.vx * enemySpeed; b.y += b.vy * enemySpeed;
      b.life--;
      if (b.life <= 0 || b.y > VH + 20 || b.y < -20 || b.x < -20 || b.x > VW + 20) enemyBullets.splice(i, 1);
    }
  }

  function updateMeteors() {
    for (let i = meteors.length - 1; i >= 0; i--) {
      const m = meteors[i];
      m.x += m.vx * enemySpeed;
      m.y += m.vy * enemySpeed;
      m.spin += m.spinV * enemySpeed;
      if (m.y > VH + 60) { meteors.splice(i, 1); continue; }
      // collide with player
      if (player.invuln <= 0 && circHit(player, m)) {
        if (player.shieldTime > 0) {
          // shield blocks — pop the meteor and a small explosion
          explosions.push({ x: m.x, y: m.y, time: 18, max: 18, radius: m.r * 1.6, color: '#7fdcff' });
          spawnDebris(m.x, m.y, '#7fdcff', 10);
          meteors.splice(i, 1);
          shake = Math.max(shake, 6);
          sfx.smallBoom();
          continue;
        }
        explosions.push({ x: m.x, y: m.y, time: 22, max: 22, radius: m.r * 1.8, color: '#ffa050' });
        meteors.splice(i, 1);
        killPlayer();
        continue;
      }
    }
  }

  // When a splitter rock dies it spawns three fast small fragments — fun
  // chain-reaction kills for kids and a great combo feeder.
  function splitMeteor(m) {
    for (let k = -1; k <= 1; k++) {
      spawnMeteor({
        x: m.x, y: m.y, vx: k * 2 + (Math.random() - 0.5),
        vy: 2.2 + Math.random() * 0.8,
        fragment: true,
      });
    }
  }

  function updateUFOs() {
    for (let i = ufos.length - 1; i >= 0; i--) {
      const u = ufos[i];
      u.x += u.vx * enemySpeed;
      u.y += Math.sin(u.x * 0.02) * 0.6 * enemySpeed;
      u.shootCooldown -= enemySpeed;
      if (u.shootCooldown <= 0) {
        u.shootCooldown = 90 + Math.random() * 40;
        // aim a slow bolt at the player
        const dx = player.x - u.x, dy = player.y - u.y;
        const d = Math.max(1, Math.hypot(dx, dy));
        enemyBullets.push({ x: u.x, y: u.y + 6, vx: dx / d * 3.6, vy: dy / d * 3.6, r: 4, life: 220 });
        sfx.hit();
      }
      if (u.x < -40 || u.x > VW + 40) { ufos.splice(i, 1); continue; }
      if (player.invuln <= 0 && circHit(player, u)) {
        if (player.shieldTime > 0) {
          explosions.push({ x: u.x, y: u.y, time: 22, max: 22, radius: 40, color: '#aaff60' });
          spawnDebris(u.x, u.y, '#aaff60', 12);
          ufos.splice(i, 1);
          sfx.smallBoom();
          continue;
        }
        explosions.push({ x: u.x, y: u.y, time: 26, max: 26, radius: 45, color: '#aaff60' });
        ufos.splice(i, 1);
        killPlayer();
      }
    }
  }

  // ── Kamikaze drones ── arrive in pods of 3-5 from the top, lock onto the
  // player, dive. No projectiles — they're a ramming threat. Cheap and weak,
  // but their swarm makes the screen feel alive.
  function updateKamikazes() {
    for (let i = kamikazes.length - 1; i >= 0; i--) {
      const k = kamikazes[i];
      const dx = player.x - k.x;
      k.vx += Math.sign(dx) * 0.06;
      k.vx = Math.max(-2.4, Math.min(2.4, k.vx));
      k.x += k.vx * enemySpeed;
      k.y += k.vy * enemySpeed;
      k.thruster = (k.thruster + 1) % 4;
      if (k.y > VH + 40) { kamikazes.splice(i, 1); continue; }
      if (player.invuln <= 0 && circHit(player, k)) {
        if (player.shieldTime > 0) {
          explosions.push({ x: k.x, y: k.y, time: 18, max: 18, radius: 28, color: '#c45fff' });
          spawnDebris(k.x, k.y, '#c45fff', 8);
          kamikazes.splice(i, 1);
          sfx.smallBoom();
          continue;
        }
        explosions.push({ x: k.x, y: k.y, time: 22, max: 22, radius: 32, color: '#c45fff' });
        kamikazes.splice(i, 1);
        killPlayer();
      }
    }
  }

  // ── Turret asteroids ── fall in, lock at an altitude, fire aimed bolts.
  // Slow but tanky (4 HP) — players must prioritise them or eat damage.
  function updateTurrets() {
    for (let i = turrets.length - 1; i >= 0; i--) {
      const t = turrets[i];
      t.spin += 0.02 * enemySpeed;
      if (t.phase === 'falling') {
        t.y += t.vy * enemySpeed;
        if (t.y >= t.dockY) { t.phase = 'docked'; t.vy = 0; sfx.warn(); }
      } else {
        t.cooldown -= enemySpeed;
        if (t.cooldown <= 0) {
          t.cooldown = 95 + Math.random() * 30;
          const dx = player.x - t.x, dy = player.y - t.y;
          const d = Math.max(1, Math.hypot(dx, dy));
          enemyBullets.push({ x: t.x, y: t.y + 6, vx: dx / d * 4.2, vy: dy / d * 4.2, r: 5, life: 200, color: '#ff7a30' });
          sfx.hit();
        }
      }
      if (player.invuln <= 0 && circHit(player, t)) {
        if (player.shieldTime > 0) {
          explosions.push({ x: t.x, y: t.y, time: 22, max: 22, radius: 40, color: '#ff7a30' });
          spawnDebris(t.x, t.y, '#ff7a30', 10);
          turrets.splice(i, 1);
          sfx.smallBoom();
          continue;
        }
        explosions.push({ x: t.x, y: t.y, time: 26, max: 26, radius: 50, color: '#ff7a30' });
        turrets.splice(i, 1);
        killPlayer();
      }
    }
  }

  // ── Mothership mini-boss (wave 4) ── glides into position, hovers across
  // the top, periodically drops kamikaze pods + fires aimed twin bolts.
  // Takes a chunk of HP; clearing it unlocks the harder back half of the
  // run. Re-uses drawZorg-style hull but flatter and red.
  function updateMothership() {
    if (!miniBoss) return;
    const m = miniBoss;
    m.moveT++;
    if (m.flash > 0) m.flash--;
    if (m.phase === 'entering') {
      m.y += (m.ty - m.y) * 0.04;
      if (Math.abs(m.ty - m.y) < 1.5) m.phase = 'fight';
      return;
    }
    if (m.phase === 'dying') {
      m.deathT = (m.deathT || 0) + 1;
      if (m.deathT % 8 === 0) {
        explosions.push({
          x: m.x + (Math.random() - 0.5) * 100,
          y: m.y + (Math.random() - 0.5) * 30,
          time: 24, max: 24, radius: 36 + Math.random() * 18, color: '#ff5252',
        });
        sfx.smallBoom();
        shake = Math.max(shake, 8);
      }
      if (m.deathT > 60) {
        explosions.push({ x: m.x, y: m.y, time: 40, max: 40, radius: 120, color: '#fff' });
        spawnDebris(m.x, m.y, '#ff5252', 36);
        sfx.boom();
        shake = Math.max(shake, 16);
        addPoints(800, m.x, m.y, '+800');
        floatingTexts.push({ x: VW / 2, y: VH / 2, vy: -0.4, time: 90, text: 'MOTHERSHIP DOWN!', color: '#ffe066', size: 28 });
        // Boss-clear loot drop — three crates so kids feel rewarded
        spawnPowerup(m.x - 40, m.y, 'bomb');
        spawnPowerup(m.x,      m.y, 'shield');
        spawnPowerup(m.x + 40, m.y, 'life');
        try {
          if ('speechSynthesis' in window) {
            const u = new SpeechSynthesisUtterance('Mothership down!');
            u.pitch = 1.1; u.rate = 1.0; u.volume = 0.9;
            window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
          }
        } catch {}
        miniBoss = null;
        // proceed to next wave
        startWave(wave + 1);
      }
      return;
    }
    // hover sweep across the top — slower than before so kids can read it
    m.x += m.moveX * 1.0 * enemySpeed;
    if (m.x < 80)  { m.x = 80;  m.moveX = 1; }
    if (m.x > VW - 80) { m.x = VW - 80; m.moveX = -1; }
    m.y = m.ty + Math.sin(m.moveT * 0.04) * 14;

    m.shootCooldown -= enemySpeed;
    if (m.shootCooldown <= 0) {
      m.shootCooldown = 130 + Math.random() * 40;
      const dx = player.x - m.x, dy = player.y - m.y;
      const d = Math.max(1, Math.hypot(dx, dy));
      const bx = dx / d, by = dy / d;
      // twin bolt — slower so it's dodgeable
      for (const off of [-12, 12]) {
        enemyBullets.push({ x: m.x + off, y: m.y + 14, vx: bx * 3.0, vy: by * 3.0, r: 4, life: 220, color: '#ff5252' });
      }
      sfx.hit();
    }
    m.dropCooldown -= enemySpeed;
    if (m.dropCooldown <= 0) {
      m.dropCooldown = 320 + Math.random() * 100;
      // pod of 2 (was 3) and they start slower
      for (let k = 0; k < 2; k++) {
        spawnKamikaze({ x: m.x + (k - 0.5) * 30, y: m.y + 14, vx: (k - 0.5) * 0.5, vy: 1.4 + Math.random() * 0.5 });
      }
      sfx.warn();
    }
    // Half-HP care package — shield + bomb fall to help you finish.
    if (!m.halfHpDrop && m.hp <= m.maxHp / 2) {
      m.halfHpDrop = true;
      spawnPowerup(m.x - 22, m.y + 24, 'shield');
      spawnPowerup(m.x + 22, m.y + 24, 'bomb');
    }

    if (player.invuln <= 0 && circHit(player, m)) {
      if (player.shieldTime > 0) {
        player.y = Math.min(VH - 30, player.y + 50);
        sfx.smallBoom();
      } else killPlayer();
    }
  }

  // ── LASER ── continuous vertical beam from the ship's nose to the top of
  // the screen. While active, normal bullet firing is suppressed; instead we
  // tick damage every frame to anything inside a thin column over the ship.
  function updateLaser() {
    if (player.laserTime <= 0) return;
    const colX = player.x;
    const halfW = 10;
    const tick = (e) => {
      if (Math.abs(e.x - colX) < halfW + (e.r || 0)) {
        return true;
      }
      return false;
    };
    // The laser tears through everything in its column at one HP per 4 frames.
    if ((player.laserTime % 4) !== 0) return;
    for (let i = meteors.length - 1; i >= 0; i--) {
      const m = meteors[i];
      if (m.y < player.y && tick(m)) {
        m.hp--;
        spawnDebris(m.x, m.y, m.kind === 'ice' ? '#aae6ff' : '#ff8040', 2);
        if (m.hp <= 0) {
          explosions.push({ x: m.x, y: m.y, time: 18, max: 18, radius: m.r * 1.5, color: m.kind === 'ice' ? '#aae6ff' : '#ffa050' });
          spawnDebris(m.x, m.y, m.kind === 'ice' ? '#aae6ff' : '#ff8040', m.big ? 14 : 6);
          const pts = m.big ? 30 : (m.kind === 'ice' ? 20 : 10);
          addPoints(pts, m.x, m.y);
          if (m.splitter) splitMeteor(m);
          if (Math.random() < (m.big ? 0.60 : 0.18)) spawnPowerup(m.x, m.y);
          meteors.splice(i, 1);
          if (state === PLAYING) meteorsRemaining = Math.max(0, meteorsRemaining - (m.fragment ? 0 : 1));
        }
      }
    }
    for (let i = ufos.length - 1; i >= 0; i--) {
      const u = ufos[i];
      if (u.y < player.y && tick(u)) {
        u.hp--;
        if (u.hp <= 0) {
          explosions.push({ x: u.x, y: u.y, time: 22, max: 22, radius: 36, color: '#aaff60' });
          spawnDebris(u.x, u.y, '#aaff60', 10);
          addPoints(80, u.x, u.y, '+80');
          if (Math.random() < 0.55) spawnPowerup(u.x, u.y);
          ufos.splice(i, 1);
        }
      }
    }
    for (let i = kamikazes.length - 1; i >= 0; i--) {
      const k = kamikazes[i];
      if (k.y < player.y && tick(k)) {
        explosions.push({ x: k.x, y: k.y, time: 16, max: 16, radius: 22, color: '#c45fff' });
        spawnDebris(k.x, k.y, '#c45fff', 6);
        addPoints(40, k.x, k.y, '+40');
        if (Math.random() < 0.18) spawnPowerup(k.x, k.y);
        kamikazes.splice(i, 1);
      }
    }
    for (let i = turrets.length - 1; i >= 0; i--) {
      const t = turrets[i];
      if (t.y < player.y && tick(t)) {
        t.hp--;
        if (t.hp <= 0) {
          explosions.push({ x: t.x, y: t.y, time: 24, max: 24, radius: 40, color: '#ff7a30' });
          spawnDebris(t.x, t.y, '#ff7a30', 14);
          addPoints(120, t.x, t.y, '+120');
          if (Math.random() < 0.60) spawnPowerup(t.x, t.y);
          turrets.splice(i, 1);
        }
      }
    }
    if (miniBoss && miniBoss.phase === 'fight' && Math.abs(miniBoss.x - colX) < halfW + miniBoss.r) {
      miniBoss.hp = Math.max(0, miniBoss.hp - 1);
      miniBoss.flash = 4;
      if (miniBoss.hp <= 0) startMiniBossDeath();
    }
    if (zorg && zorg.phase === 'fight' && Math.abs(zorg.x - colX) < halfW + zorg.r) {
      zorg.hp = Math.max(0, zorg.hp - 1);
      zorg.flash = 4;
      if (zorg.hp <= 0) startZorgDeath();
    }
  }

  function startMiniBossDeath() {
    miniBoss.phase = 'dying';
    miniBoss.deathT = 0;
  }

  function updatePowerups() {
    for (let i = powerups.length - 1; i >= 0; i--) {
      const p = powerups[i];
      // MAGNET: accelerate toward the player when active.
      if (player.magnetTime > 0) {
        const dx = player.x - p.x, dy = player.y - p.y;
        const d = Math.max(1, Math.hypot(dx, dy));
        p.vx += (dx / d) * 0.35;
        p.vy += (dy / d) * 0.35;
        p.vx = Math.max(-6, Math.min(6, p.vx));
        p.vy = Math.max(-2, Math.min(6, p.vy));
      } else {
        p.vx *= 0.96;
        if (p.vy < 1.2) p.vy = Math.min(1.2, p.vy + 0.04);
      }
      p.x += p.vx;
      p.y += p.vy;
      p.rotation += 0.04;
      if (p.y > VH + 40 || p.x < -40 || p.x > VW + 40) { powerups.splice(i, 1); continue; }
      if (circHit(player, p)) {
        applyPowerup(p.kind);
        powerups.splice(i, 1);
      }
    }
  }

  // ── Background events ── distant comets streaking behind the play field.
  // Pure scenery; never collide with anything. Adds liveliness to slow moments.
  function updateBgComets() {
    if (Math.random() < 0.0035 && bgComets.length < 2) {
      bgComets.push({
        x: -60, y: 30 + Math.random() * 220,
        vx: 3 + Math.random() * 2.5, vy: 0.4 + Math.random() * 0.6,
        len: 60 + Math.random() * 60,
        color: Math.random() < 0.5 ? '#ffd8b0' : '#cce6ff',
      });
    }
    for (let i = bgComets.length - 1; i >= 0; i--) {
      const c = bgComets[i];
      c.x += c.vx; c.y += c.vy;
      if (c.x > VW + 120) bgComets.splice(i, 1);
    }
  }

  // ── Combo tick ── decay the combo when no kills have happened recently
  function updateCombo() {
    if (comboTimer > 0) {
      comboTimer--;
      if (comboTimer <= 0) resetCombo();
    }
  }

  // ── Meteor shower set-piece ── triggers occasionally during a wave,
  // shows a banner, then rains meteors at 4-5x normal rate for 5 seconds.
  function maybeTriggerShower() {
    if (state !== PLAYING) return;
    if (meteorShowerT > 0) return;
    const def = WAVES[wave - 1];
    if (!def || !def.showerChance) return;
    if (Math.random() < def.showerChance) {
      meteorShowerT = 300;
      floatingTexts.push({ x: VW / 2, y: 90, vy: -0.4, time: 100, text: 'METEOR SHOWER!', color: '#ff5252', size: 28 });
      shake = Math.max(shake, 6);
      sfx.warn();
    }
  }
  function updateMeteorShower() {
    if (meteorShowerT <= 0) return;
    meteorShowerT--;
    if (meteorShowerT % 10 === 0) spawnMeteor();
  }

  function applyPowerup(kind) {
    sfx.pickup();
    let label = '', color = '#ffe066';
    if (kind === 'rapid')        { player.power = Math.max(player.power, 2); player.powerTime = 600; label = 'RAPID FIRE'; color = '#ffce4d'; }
    else if (kind === 'spread')  { player.power = 3; player.powerTime = 600; label = 'SPREAD SHOT'; color = '#ff80b3'; }
    else if (kind === 'shield')  { player.shieldTime = 600; sfx.shield(); label = 'SHIELD'; color = '#7fdcff'; }
    else if (kind === 'bomb')    { bombs = Math.min(9, bombs + 1); syncBombBtn(); label = '+ BOMB'; color = '#ffb24d'; }
    else if (kind === 'life')    { lives = Math.min(5, lives + 1); label = '+ LIFE'; color = '#ff80b3'; }
    else if (kind === 'magnet')  { player.magnetTime = Math.max(player.magnetTime, 900); label = 'MAGNET'; color = '#c45fff'; }
    else if (kind === 'homing')  { player.homingTime = Math.max(player.homingTime, 600); label = 'HOMING'; color = '#5dd66c'; }
    else if (kind === 'laser')   { player.laserTime  = Math.max(player.laserTime, 360);  label = 'LASER';  color = '#ff5252'; }
    else if (kind === 'slowmo')  { player.slowTime   = Math.max(player.slowTime, 360);   label = 'SLOW-MO'; color = '#aae6ff'; }
    else if (kind === 'wingmen') { spawnWingmen(); label = 'WINGMEN'; color = '#ffe066'; }
    floatingTexts.push({ x: player.x, y: player.y - 28, vy: -0.8, time: 70, text: label, color, size: 18 });
    speakVoice(pilotId);
  }

  function spawnWingmen() {
    player.wingmenTime = 720;
    wingmen.length = 0;
    wingmen.push({ side: -1, offsetX: -34, offsetY: 6, cooldown: 0, hp: 1 });
    wingmen.push({ side:  1, offsetX:  34, offsetY: 6, cooldown: 8, hp: 1 });
  }

  // bullet ↔ enemy collisions
  function updateCollisions() {
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      let hit = false;
      for (let j = meteors.length - 1; j >= 0; j--) {
        const m = meteors[j];
        if (circHit(b, m)) {
          m.hp--;
          sfx.hit();
          spawnDebris(b.x, b.y, m.kind === 'ice' ? '#aae6ff' : (m.kind === 'splitter' ? '#5dd66c' : '#ff8040'), 4);
          if (m.hp <= 0) {
            const popColor = m.kind === 'ice' ? '#aae6ff' : m.kind === 'splitter' ? '#5dd66c' : '#ffa050';
            explosions.push({ x: m.x, y: m.y, time: 22, max: 22, radius: m.r * 1.8, color: popColor });
            spawnDebris(m.x, m.y, popColor, m.big ? 16 : 8);
            const pts = m.fragment ? 5 : (m.big ? 30 : (m.kind === 'ice' ? 20 : (m.kind === 'splitter' ? 15 : 10)));
            addPoints(pts, m.x, m.y);
            if (m.splitter) splitMeteor(m);
            if (!m.fragment && Math.random() < (m.big ? 0.60 : 0.18)) spawnPowerup(m.x, m.y);
            meteors.splice(j, 1);
            if (state === PLAYING && !m.fragment) meteorsRemaining--;
            sfx.smallBoom();
          }
          hit = true;
          break;
        }
      }
      if (hit) { bullets.splice(i, 1); continue; }
      for (let j = ufos.length - 1; j >= 0; j--) {
        const u = ufos[j];
        if (circHit(b, u)) {
          u.hp--;
          sfx.hit();
          if (u.hp <= 0) {
            explosions.push({ x: u.x, y: u.y, time: 26, max: 26, radius: 40, color: '#aaff60' });
            spawnDebris(u.x, u.y, '#aaff60', 12);
            addPoints(80, u.x, u.y, '+80');
            if (Math.random() < 0.55) spawnPowerup(u.x, u.y);
            ufos.splice(j, 1);
            sfx.smallBoom();
          }
          hit = true;
          break;
        }
      }
      if (hit) { bullets.splice(i, 1); continue; }
      for (let j = kamikazes.length - 1; j >= 0; j--) {
        const k = kamikazes[j];
        if (circHit(b, k)) {
          explosions.push({ x: k.x, y: k.y, time: 20, max: 20, radius: 28, color: '#c45fff' });
          spawnDebris(k.x, k.y, '#c45fff', 8);
          addPoints(40, k.x, k.y, '+40');
          if (Math.random() < 0.18) spawnPowerup(k.x, k.y);
          kamikazes.splice(j, 1);
          sfx.smallBoom();
          hit = true;
          break;
        }
      }
      if (hit) { bullets.splice(i, 1); continue; }
      for (let j = turrets.length - 1; j >= 0; j--) {
        const t = turrets[j];
        if (circHit(b, t)) {
          t.hp--;
          sfx.hit();
          spawnDebris(b.x, b.y, '#ff7a30', 4);
          if (t.hp <= 0) {
            explosions.push({ x: t.x, y: t.y, time: 26, max: 26, radius: 45, color: '#ff7a30' });
            spawnDebris(t.x, t.y, '#ff7a30', 16);
            addPoints(120, t.x, t.y, '+120');
            if (Math.random() < 0.60) spawnPowerup(t.x, t.y);
            turrets.splice(j, 1);
            sfx.smallBoom();
            hitPauseT = Math.max(hitPauseT, 3);
          }
          hit = true;
          break;
        }
      }
      if (hit) { bullets.splice(i, 1); continue; }
      if (miniBoss && miniBoss.phase === 'fight' && circHit(b, miniBoss)) {
        miniBoss.hp = Math.max(0, miniBoss.hp - 1);
        miniBoss.flash = 8;
        sfx.hit();
        spawnDebris(b.x, b.y, '#ff5252', 4);
        if (miniBoss.hp <= 0) startMiniBossDeath();
        bullets.splice(i, 1);
        continue;
      }
      if (zorg && zorg.phase !== 'dying' && circHit(b, zorg)) {
        zorg.hp = Math.max(0, zorg.hp - 1);
        zorg.flash = 8;
        sfx.hit();
        spawnDebris(b.x, b.y, '#aaff60', 4);
        if (zorg.hp <= 0) startZorgDeath();
        bullets.splice(i, 1);
      }
    }
    // enemy bullets hit player
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
      const b = enemyBullets[i];
      if (player.invuln <= 0 && circHit(player, b)) {
        if (player.shieldTime > 0) {
          spawnDebris(b.x, b.y, '#7fdcff', 6);
          enemyBullets.splice(i, 1);
          sfx.hit();
          continue;
        }
        enemyBullets.splice(i, 1);
        killPlayer();
      }
    }
  }

  function circHit(a, b) {
    const dx = a.x - b.x, dy = a.y - b.y;
    const r = (a.r || 6) + (b.r || 6);
    return dx * dx + dy * dy < r * r;
  }

  function updateExplosionsParticlesText() {
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].time--;
      if (explosions[i].time <= 0) explosions.splice(i, 1);
    }
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.05;
      p.vx *= 0.99;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
      const ft = floatingTexts[i];
      ft.y += ft.vy;
      ft.time--;
      if (ft.time <= 0) floatingTexts.splice(i, 1);
    }
  }

  function updateWave() {
    if (state !== PLAYING) return;
    const def = WAVES[wave - 1];
    if (!def || def.boss) return;
    waveTimer++;
    if (meteorsRemaining > 0) {
      waveSpawnAcc++;
      if (waveSpawnAcc >= waveSpawnInterval) {
        waveSpawnAcc = 0;
        if (def.ufoEvery > 0 && Math.floor(waveTimer / waveSpawnInterval) % def.ufoEvery === def.ufoEvery - 1) {
          spawnUFO();
        } else {
          spawnMeteor();
        }
      }
      // Kamikaze swarms — every kamikazeEvery cycles, drop a pod of 3-5
      if (def.kamikazeEvery > 0) {
        kamikazeAcc++;
        if (kamikazeAcc >= def.kamikazeEvery * 18) {
          kamikazeAcc = 0;
          const count = 3 + Math.floor(Math.random() * 3);
          for (let k = 0; k < count; k++) {
            spawnKamikaze({ x: 80 + Math.random() * (VW - 160), y: -20 - k * 22, vx: (Math.random() - 0.5) * 1.2 });
          }
        }
      }
      // Turret asteroids (one at a time, slow trickle)
      if (def.turretEvery > 0) {
        turretAcc++;
        if (turretAcc >= def.turretEvery * 22 && turrets.length < 2) {
          turretAcc = 0;
          spawnTurret();
        }
      }
      // Random meteor-shower set piece
      maybeTriggerShower();
    }
    // wave complete when all spawn queues empty AND nothing on screen
    if (meteorsRemaining <= 0 && meteorShowerT <= 0 &&
        meteors.length === 0 && ufos.length === 0 &&
        kamikazes.length === 0 && turrets.length === 0) {
      startWave(wave + 1);
    }
  }

  function updateZorg() {
    if (!zorg) return;
    zorg.moveT++;
    if (zorg.flash > 0) zorg.flash--;
    if (zorg.phase === 'entering') {
      zorg.y += (zorg.ty - zorg.y) * 0.04;
      if (Math.abs(zorg.ty - zorg.y) < 1.5) {
        zorg.phase = 'fight';
        try {
          if ('speechSynthesis' in window) {
            const u = new SpeechSynthesisUtterance('You cannot defeat me!');
            u.pitch = 0.4; u.rate = 0.85; u.volume = 0.9;
            window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
          }
        } catch {}
      }
      return;
    }
    if (zorg.phase === 'dying') {
      zorg.deathT = (zorg.deathT || 0) + 1;
      if (zorg.deathT % 10 === 0) {
        explosions.push({
          x: zorg.x + (Math.random() - 0.5) * 80,
          y: zorg.y + (Math.random() - 0.5) * 50,
          time: 28, max: 28, radius: 40 + Math.random() * 20, color: '#ffce4d',
        });
        sfx.smallBoom();
        shake = Math.max(shake, 8);
      }
      if (zorg.deathT > 90) {
        explosions.push({ x: zorg.x, y: zorg.y, time: 50, max: 50, radius: 140, color: '#fff' });
        spawnDebris(zorg.x, zorg.y, '#aaff60', 50);
        sfx.boom();
        shake = Math.max(shake, 24);
        addPoints(2000, zorg.x, zorg.y, '+2000');
        zorg = null;
        winGame();
      }
      return;
    }

    // figure-8 hover
    const t = zorg.moveT * 0.012;
    zorg.x = VW / 2 + Math.sin(t) * 240;
    zorg.y = 110 + Math.sin(t * 2) * 35;

    // shooting pattern: 3-round burst aimed at player
    zorg.shootCooldown--;
    if (zorg.shootCooldown <= 0) {
      zorg.shootCooldown = 60 + Math.random() * 30;
      const dx = player.x - zorg.x, dy = player.y - zorg.y;
      const d = Math.max(1, Math.hypot(dx, dy));
      const bx = dx / d, by = dy / d;
      for (let i = -1; i <= 1; i++) {
        const a = i * 0.18;
        const cs = Math.cos(a), sn = Math.sin(a);
        enemyBullets.push({
          x: zorg.x, y: zorg.y + 20,
          vx: (bx * cs - by * sn) * 4.4,
          vy: (bx * sn + by * cs) * 4.4,
          r: 5, life: 200, color: '#aaff60',
        });
      }
      sfx.bigShot();
    }

    // occasionally drops a meteor
    zorg.meteorCooldown--;
    if (zorg.meteorCooldown <= 0) {
      zorg.meteorCooldown = 180 + Math.random() * 120;
      meteors.push({
        x: zorg.x + (Math.random() - 0.5) * 80,
        y: zorg.y + 30,
        vx: (Math.random() - 0.5) * 2,
        vy: 2.2 + Math.random(),
        r: 18 + Math.random() * 6,
        hp: 1, maxHp: 1,
        kind: 'rock',
        spin: 0, spinV: (Math.random() - 0.5) * 0.05,
        big: false,
      });
      sfx.warn();
    }

    // body collision with the player
    if (player.invuln <= 0 && circHit(player, zorg)) {
      if (player.shieldTime > 0) {
        // bounce back
        player.y = Math.min(VH - 30, player.y + 40);
        spawnDebris(player.x, player.y, '#7fdcff', 6);
        sfx.smallBoom();
      } else {
        killPlayer();
      }
    }
  }

  function startZorgDeath() {
    zorg.phase = 'dying';
    zorg.deathT = 0;
    hitPauseT = Math.max(hitPauseT, 8);
    try {
      if ('speechSynthesis' in window) {
        const u = new SpeechSynthesisUtterance('Noooo!');
        u.pitch = 0.4; u.rate = 0.6; u.volume = 0.95;
        window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
      }
    } catch {}
  }

  // ───── render ─────
  function applyCamera() {
    let ex = offX, ey = offY;
    if (shake > 0) {
      ex += (Math.random() - 0.5) * shake * 0.8;
      ey += (Math.random() - 0.5) * shake * 0.8;
    }
    ctx.setTransform(scale, 0, 0, scale, ex, ey);
  }

  function drawShip() {
    const p = player;
    const f = PILOTS[pilotId];
    ctx.save();
    // post-respawn blink
    if (p.invuln > 0 && Math.floor(p.invuln / 4) % 2 === 0) { ctx.restore(); return; }
    // thruster flame
    ctx.save();
    const flick = 4 + Math.sin(p.thruster * 1.5) * 2;
    ctx.shadowBlur = 14; ctx.shadowColor = '#ffce4d';
    ctx.fillStyle = '#ffce4d';
    ctx.beginPath();
    ctx.moveTo(p.x - 6, p.y + 12);
    ctx.lineTo(p.x + 6, p.y + 12);
    ctx.lineTo(p.x, p.y + 12 + flick + 4);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff7d0';
    ctx.beginPath();
    ctx.moveTo(p.x - 2, p.y + 12);
    ctx.lineTo(p.x + 2, p.y + 12);
    ctx.lineTo(p.x, p.y + 12 + flick);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // hull (chunky arrow shape in the pilot's color)
    ctx.shadowBlur = 10; ctx.shadowColor = f.color;
    ctx.fillStyle = f.color;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y - 16);
    ctx.lineTo(p.x + 14, p.y + 12);
    ctx.lineTo(p.x + 6, p.y + 8);
    ctx.lineTo(p.x - 6, p.y + 8);
    ctx.lineTo(p.x - 14, p.y + 12);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // wings (darker)
    ctx.fillStyle = 'rgba(0,0,0,0.30)';
    ctx.fillRect(p.x - 14, p.y + 8, 8, 4);
    ctx.fillRect(p.x + 6,  p.y + 8, 8, 4);

    // cockpit — tinted face peeking out (pilot identity)
    ctx.fillStyle = f.skinColor;
    ctx.beginPath(); ctx.arc(p.x, p.y - 2, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#7fdcff';
    ctx.beginPath();
    ctx.arc(p.x, p.y - 4, 6, Math.PI, 2 * Math.PI);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath(); ctx.arc(p.x - 2, p.y - 6, 1.4, 0, Math.PI * 2); ctx.fill();

    // shield bubble
    if (p.shieldTime > 0) {
      ctx.save();
      const a = 0.35 + Math.sin(Date.now() / 90) * 0.18;
      ctx.shadowBlur = 16; ctx.shadowColor = '#7fdcff';
      ctx.strokeStyle = `rgba(127,220,255,${a})`;
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(p.x, p.y, 24, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  }

  function drawBullet(b) {
    ctx.save();
    ctx.shadowBlur = 12; ctx.shadowColor = b.color;
    ctx.strokeStyle = b.color; ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.lineTo(b.x - b.vx * 0.7, b.y - b.vy * 0.7);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.lineTo(b.x - b.vx * 0.7, b.y - b.vy * 0.7);
    ctx.stroke();
    ctx.restore();
  }

  function drawEnemyBullet(b) {
    ctx.save();
    const col = b.color || '#ff5050';
    ctx.shadowBlur = 10; ctx.shadowColor = col;
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(b.x - 1, b.y - 1, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Meteor visual — ported from fightinggame's drawMeteor (the falling phase),
  // adapted for our 2D motion (trail follows -velocity).
  function drawMeteor(m) {
    const isIce = m.kind === 'ice';
    const isSplitter = m.kind === 'splitter';
    ctx.save();
    if (isIce) {
      ctx.shadowBlur = 22; ctx.shadowColor = '#aae6ff';
      ctx.strokeStyle = 'rgba(140,220,255,0.6)';
    } else if (isSplitter) {
      ctx.shadowBlur = 22; ctx.shadowColor = '#5dd66c';
      ctx.strokeStyle = 'rgba(120,220,120,0.55)';
    } else {
      ctx.shadowBlur = 22; ctx.shadowColor = '#ff5500';
      ctx.strokeStyle = 'rgba(255,140,40,0.55)';
    }
    ctx.lineWidth = 9; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    ctx.lineTo(m.x - m.vx * 5, m.y - m.vy * 5);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // body
    ctx.translate(m.x, m.y);
    ctx.rotate(m.spin);
    let core, mid, glint;
    if (isIce)            { core = '#3aa0d0'; mid = '#aae6ff'; glint = '#ffffff'; }
    else if (isSplitter)  { core = '#2a7030'; mid = '#5dd66c'; glint = '#c5ffce'; }
    else                  { core = '#aa3300'; mid = '#ff9944'; glint = '#fff7d0'; }
    ctx.fillStyle = core;
    ctx.beginPath(); ctx.arc(0, 0, m.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = mid;
    ctx.beginPath(); ctx.arc(-m.r * 0.25, -m.r * 0.25, m.r * 0.55, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = glint;
    ctx.beginPath(); ctx.arc(-m.r * 0.35, -m.r * 0.35, m.r * 0.25, 0, Math.PI * 2); ctx.fill();
    // splitters get cracks so the kids learn what's coming
    if (isSplitter) {
      ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-m.r * 0.7, 0); ctx.lineTo(m.r * 0.3, m.r * 0.4);
      ctx.moveTo(-m.r * 0.2, -m.r * 0.6); ctx.lineTo(m.r * 0.5, -m.r * 0.2);
