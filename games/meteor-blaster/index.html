      ctx.stroke();
    }
    if (m.big && m.hp < m.maxHp) {
      ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-m.r * 0.5, 0); ctx.lineTo(m.r * 0.3, m.r * 0.4); ctx.lineTo(m.r * 0.5, -m.r * 0.2);
      ctx.stroke();
    }
    ctx.restore();
  }

  // UFO visual — ported from fightinggame's drawEnemyShip
  function drawUFO(s) {
    ctx.save();
    ctx.shadowBlur = 10; ctx.shadowColor = '#aaff60';
    ctx.fillStyle = '#5a5a6a';
    ctx.beginPath(); ctx.ellipse(s.x, s.y, 24, 8, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#aaff60';
    ctx.beginPath(); ctx.arc(s.x, s.y - 4, 9, Math.PI, 2 * Math.PI); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(s.x - 2, s.y - 6, 2, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#ffce4d';
    ctx.beginPath(); ctx.arc(s.x - Math.sign(s.vx) * 26, s.y + 2, 3, 0, Math.PI * 2); ctx.fill();
    // tiny HP pip if a hit landed
    if (s.hp < s.maxHp) {
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ff5252';
      ctx.fillRect(s.x - 10, s.y - 14, 20, 2);
      ctx.fillStyle = '#5dd66c';
      ctx.fillRect(s.x - 10, s.y - 14, 20 * (s.hp / s.maxHp), 2);
    }
    ctx.restore();
  }

  // Background streak — sceneic comet far behind the action plane. Drawn
  // before stars so the parallax reads as "way out there".
  function drawBgComet(c) {
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.shadowBlur = 18; ctx.shadowColor = c.color;
    ctx.strokeStyle = c.color; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(c.x, c.y);
    ctx.lineTo(c.x - c.len, c.y - c.len * 0.15);
    ctx.stroke();
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(c.x, c.y, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Kamikaze drone — a small purple arrow with a flicker thruster, points
  // downward. Cheap and reads instantly as "incoming".
  function drawKamikaze(k) {
    ctx.save();
    ctx.shadowBlur = 10; ctx.shadowColor = '#c45fff';
    // thruster
    const flick = 3 + (k.thruster % 2 ? 1.5 : 0);
    ctx.fillStyle = '#ffd84d';
    ctx.beginPath();
    ctx.moveTo(k.x - 4, k.y - 8);
    ctx.lineTo(k.x + 4, k.y - 8);
    ctx.lineTo(k.x, k.y - 8 - flick);
    ctx.closePath(); ctx.fill();
    // body — pointed down toward player
    ctx.fillStyle = '#c45fff';
    ctx.beginPath();
    ctx.moveTo(k.x, k.y + 10);
    ctx.lineTo(k.x + 9, k.y - 8);
    ctx.lineTo(k.x - 9, k.y - 8);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath(); ctx.arc(k.x, k.y - 1, 2, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Turret asteroid — chunky rock with a glowing cannon barrel that aims
  // down/at the player. Spin for menace; HP bar when damaged.
  function drawTurret(t) {
    ctx.save();
    ctx.shadowBlur = 10; ctx.shadowColor = '#ff7a30';
    ctx.translate(t.x, t.y);
    ctx.save();
    ctx.rotate(t.spin);
    ctx.fillStyle = '#6a4030';
    ctx.beginPath(); ctx.arc(0, 0, t.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#8a5030';
    ctx.beginPath(); ctx.arc(-5, -5, t.r * 0.55, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#3a1f0c';
    ctx.beginPath(); ctx.arc(6, 4, t.r * 0.25, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    // glowing barrel pointing toward the player
    if (t.phase !== 'falling') {
      const dx = player ? player.x - t.x : 0;
      const dy = player ? player.y - t.y : 1;
      const ang = Math.atan2(dy, dx);
      ctx.rotate(ang);
      ctx.fillStyle = '#222';
      ctx.fillRect(0, -4, t.r + 6, 8);
      ctx.shadowBlur = 12; ctx.shadowColor = '#ff7a30';
      ctx.fillStyle = '#ff7a30';
      ctx.beginPath(); ctx.arc(t.r + 6, 0, 3.5, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
    if (t.hp < t.maxHp) {
      ctx.fillStyle = '#ff5252';
      ctx.fillRect(t.x - 18, t.y - t.r - 8, 36, 3);
      ctx.fillStyle = '#5dd66c';
      ctx.fillRect(t.x - 18, t.y - t.r - 8, 36 * (t.hp / t.maxHp), 3);
    }
  }

  // Mothership mini-boss — wider/flatter than Zorg's saucer, red palette.
  // Rim lights, a glowing drop bay, and a HP bar above. Reuses the Zorg
  // hull-gradient language so the family reads them as a related pair.
  function drawMothership() {
    if (!miniBoss) return;
    const m = miniBoss;
    ctx.save();
    if (m.flash > 0) {
      ctx.shadowBlur = 18; ctx.shadowColor = '#ffffff';
      ctx.globalAlpha = 0.65 + Math.random() * 0.35;
    }
    // aura
    const pulse = Math.sin(Date.now() / 240) * 0.18 + 0.7;
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.strokeStyle = '#ff5252';
    ctx.shadowBlur = 28; ctx.shadowColor = '#ff5252';
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.ellipse(m.x, m.y, 78, 26, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
    // hull (wide saucer)
    ctx.shadowBlur = 14; ctx.shadowColor = '#ff5252';
    const grd = ctx.createLinearGradient(m.x, m.y - 12, m.x, m.y + 18);
    grd.addColorStop(0, '#9a6a6a');
    grd.addColorStop(0.5, '#5a2a2a');
    grd.addColorStop(1, '#2a1010');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.ellipse(m.x, m.y + 6, 72, 14, 0, 0, Math.PI * 2); ctx.fill();
    // rim lights
    ctx.fillStyle = '#ffce4d';
    for (let i = -3; i <= 3; i++) {
      ctx.beginPath(); ctx.arc(m.x + i * 20, m.y + 16, 2.2, 0, Math.PI * 2); ctx.fill();
    }
    // dome (red instead of green — visually distinct from Zorg)
    ctx.shadowBlur = 18; ctx.shadowColor = '#ff5252';
    ctx.fillStyle = '#a02020';
    ctx.beginPath(); ctx.arc(m.x, m.y, 22, Math.PI, 2 * Math.PI); ctx.fill();
    // pilot
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#dc4a4a';
    ctx.beginPath(); ctx.arc(m.x, m.y - 4, 10, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(m.x - 3, m.y - 4, 1.6, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(m.x + 3, m.y - 4, 1.6, 0, Math.PI * 2); ctx.fill();
    // drop bay glow underneath
    ctx.shadowBlur = 14; ctx.shadowColor = '#ffce4d';
    ctx.fillStyle = 'rgba(255,200,80,0.25)';
    ctx.beginPath();
    ctx.moveTo(m.x - 20, m.y + 16);
    ctx.lineTo(m.x + 20, m.y + 16);
    ctx.lineTo(m.x + 40, m.y + 60);
    ctx.lineTo(m.x - 40, m.y + 60);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // Wingmen — small mini-ships flanking the player, follow with smoothing.
  function drawWingman(w) {
    if (!player) return;
    const x = player.x + w.offsetX;
    const y = player.y + w.offsetY;
    ctx.save();
    ctx.shadowBlur = 8; ctx.shadowColor = '#ffe066';
    ctx.fillStyle = '#ffe066';
    ctx.beginPath();
    ctx.moveTo(x, y - 8);
    ctx.lineTo(x + 7, y + 6);
    ctx.lineTo(x - 7, y + 6);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x, y - 2, 1.8, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  // Laser beam — a vertical column from the ship to the top of the screen.
  // Three stacked layers (outer glow → core → hot spine) for that classic
  // "ow my retinas" look. Animated with a slight wobble.
  function drawLaserBeam() {
    if (!player || player.laserTime <= 0) return;
    const x = player.x;
    const top = 0, bot = player.y - 16;
    const flick = 0.85 + Math.random() * 0.3;
    ctx.save();
    ctx.shadowBlur = 28; ctx.shadowColor = '#ff5252';
    ctx.strokeStyle = `rgba(255,82,82,${0.7 * flick})`;
    ctx.lineWidth = 18; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x, bot); ctx.lineTo(x, top); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#ffce4d'; ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(x, bot); ctx.lineTo(x, top); ctx.stroke();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(x, bot); ctx.lineTo(x, top); ctx.stroke();
    // little glow dots along the beam
    ctx.fillStyle = '#fff';
    for (let k = 0; k < 6; k++) {
      const sy = (bot + ((Date.now() / 6) + k * 30) % (bot - top));
      const sx = x + Math.sin((sy + Date.now() / 50) * 0.05) * 3;
      ctx.beginPath(); ctx.arc(sx, sy, 2, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }

  // Zorg's mothership — a big version of the UFO with antennae bulbs,
  // glowing aura, and a green dome. Honors the "Zorg = alien/UFO" identity
  // from the fighting game and the alien fighter's antenna/aura palette.
  function drawZorg() {
    if (!zorg) return;
    const z = zorg;
    ctx.save();
    if (z.flash > 0) {
      ctx.shadowBlur = 18; ctx.shadowColor = '#ffffff';
      ctx.globalAlpha = 0.65 + Math.random() * 0.35;
    }
    // aura
    const pulse = Math.sin(Date.now() / 220) * 0.18 + 0.7;
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.strokeStyle = '#aaff60';
    ctx.shadowBlur = 26; ctx.shadowColor = '#aaff60';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.ellipse(z.x, z.y, 64, 32, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    // hull (big saucer with shading)
    ctx.shadowBlur = 14; ctx.shadowColor = '#aaff60';
    const grd = ctx.createLinearGradient(z.x, z.y - 12, z.x, z.y + 18);
    grd.addColorStop(0, '#8a8aa0');
    grd.addColorStop(0.5, '#5a5a6a');
    grd.addColorStop(1, '#2a2a3a');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.ellipse(z.x, z.y + 4, 58, 14, 0, 0, Math.PI * 2); ctx.fill();
    // hull rim lights
    ctx.fillStyle = '#ffce4d';
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath(); ctx.arc(z.x + i * 18, z.y + 14, 2.2, 0, Math.PI * 2); ctx.fill();
    }
    // dome (green Zorg cockpit)
    ctx.shadowBlur = 18; ctx.shadowColor = '#aaff60';
    ctx.fillStyle = '#7ac010';
    ctx.beginPath(); ctx.arc(z.x, z.y, 26, Math.PI, 2 * Math.PI); ctx.fill();
    // Zorg silhouette inside the dome — green head, antennae glow
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#9adc4a';
    ctx.beginPath(); ctx.arc(z.x, z.y - 4, 12, 0, Math.PI * 2); ctx.fill();
    // antennae
    ctx.strokeStyle = '#5a8a10'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(z.x - 5, z.y - 14);
    ctx.quadraticCurveTo(z.x - 12, z.y - 24, z.x - 8, z.y - 32);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(z.x + 5, z.y - 14);
    ctx.quadraticCurveTo(z.x + 12, z.y - 24, z.x + 8, z.y - 32);
    ctx.stroke();
    // antenna tip bulbs
    ctx.shadowBlur = 10; ctx.shadowColor = '#aaff60';
    ctx.fillStyle = '#aaff60';
    ctx.beginPath(); ctx.arc(z.x - 8, z.y - 32, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(z.x + 8, z.y - 32, 3, 0, Math.PI * 2); ctx.fill();
    // eyes
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(z.x - 4, z.y - 4, 1.8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(z.x + 4, z.y - 4, 1.8, 0, Math.PI * 2); ctx.fill();
    // angry mouth
    ctx.strokeStyle = '#222'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(z.x - 4, z.y + 3); ctx.lineTo(z.x + 4, z.y + 3);
    ctx.stroke();
    // tractor-beam glow underneath
    ctx.shadowBlur = 14; ctx.shadowColor = '#aaff60';
    ctx.fillStyle = 'rgba(170,255,96,0.20)';
    ctx.beginPath();
    ctx.moveTo(z.x - 18, z.y + 14);
    ctx.lineTo(z.x + 18, z.y + 14);
    ctx.lineTo(z.x + 40, z.y + 60);
    ctx.lineTo(z.x - 40, z.y + 60);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawExplosion(e) {
    const t = (e.max - e.time) / e.max;
    const r = e.radius * (0.15 + t * 0.95);
    ctx.save();
    ctx.globalAlpha = 1 - t;
    ctx.shadowBlur = 30; ctx.shadowColor = e.color || '#ff9933';
    ctx.strokeStyle = '#ffcc66'; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.arc(e.x, e.y, r, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = '#fff7d0'; ctx.globalAlpha = (1 - t) * 0.45;
    ctx.beginPath(); ctx.arc(e.x, e.y, r * 0.5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  function drawParticle(pt) {
    const a = pt.life / pt.maxLife;
    ctx.save();
    ctx.globalAlpha = Math.max(0, a);
    ctx.fillStyle = pt.color;
    ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.size * Math.max(0.2, a), 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  const POWERUP_META = {
    rapid:   { color: '#ffce4d', mark: 'R' },
    spread:  { color: '#ff80b3', mark: 'S' },
    shield:  { color: '#7fdcff', mark: '◊' },
    bomb:    { color: '#ffb24d', mark: 'B' },
    life:    { color: '#ff80b3', mark: '♥' },
    magnet:  { color: '#c45fff', mark: 'M' },
    homing:  { color: '#5dd66c', mark: 'H' },
    laser:   { color: '#ff5252', mark: 'L' },
    slowmo:  { color: '#aae6ff', mark: 'T' },
    wingmen: { color: '#ffe066', mark: 'W' },
  };
  function drawPowerup(p) {
    const meta = POWERUP_META[p.kind] || POWERUP_META.rapid;
    const color = meta.color;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);
    ctx.shadowBlur = 14; ctx.shadowColor = color;
    ctx.fillStyle = '#1a1a2a';
    ctx.fillRect(-12, -12, 24, 24);
    ctx.fillStyle = color;
    ctx.fillRect(-12, -12, 24, 3);
    ctx.fillRect(-12,  9, 24, 3);
    ctx.fillRect(-12, -12, 3, 24);
    ctx.fillRect(  9, -12, 3, 24);
    ctx.shadowBlur = 0;
    ctx.fillStyle = color;
    ctx.font = 'bold 16px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(meta.mark, 0, 6);
    ctx.restore();
    // Magnet pull halo when magnet is active — kids can see what's pulling
    if (player && player.magnetTime > 0) {
      ctx.save();
      ctx.globalAlpha = 0.35;
      ctx.strokeStyle = '#c45fff'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(p.x, p.y, 14 + Math.sin(Date.now()/120)*2, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }
  }

  function drawFloatingText(ft) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, Math.min(1, ft.time / 30));
    const sz = ft.size || 14;
    ctx.font = `bold ${sz}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.lineWidth = Math.max(3, sz * 0.18);
    ctx.lineJoin = 'round';
    ctx.strokeStyle = 'rgba(0,0,0,0.9)';
    ctx.strokeText(ft.text, ft.x, ft.y);
    ctx.fillStyle = ft.color || '#ffe066';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
  }

  function drawHUD() {
    const pad = 10;
    ctx.save();
    ctx.textAlign = 'left';
    ctx.font = 'bold 18px -apple-system, sans-serif';
    ctx.lineWidth = 4; ctx.lineJoin = 'round';
    ctx.strokeStyle = 'rgba(0,0,0,0.8)';
    const scoreText = 'SCORE ' + score;
    ctx.strokeText(scoreText, pad, 24);
    ctx.fillStyle = scoreFlash > 0 ? '#ffe066' : '#fff';
    ctx.fillText(scoreText, pad, 24);
    if (scoreFlash > 0) scoreFlash--;

    // wave label
    ctx.textAlign = 'center';
    const waveText = zorg ? 'ZORG'
                  : miniBoss ? 'MOTHERSHIP'
                  : ('WAVE ' + Math.min(wave, TOTAL_WAVES));
    ctx.strokeText(waveText, VW / 2, 24);
    ctx.fillStyle = '#7fdcff';
    ctx.fillText(waveText, VW / 2, 24);

    // Combo readout — only when the streak is meaningful
    if (combo >= 3) {
      const m = comboMult();
      ctx.textAlign = 'center';
      ctx.font = 'bold 16px -apple-system, sans-serif';
      const comboText = m + 'x  ' + combo + ' COMBO';
      ctx.lineWidth = 4;
      ctx.strokeStyle = 'rgba(0,0,0,0.85)';
      ctx.strokeText(comboText, VW / 2, 46);
      ctx.fillStyle = comboColor();
      ctx.fillText(comboText, VW / 2, 46);
      // decay bar underneath
      const w = 80;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(VW / 2 - w / 2 - 1, 52, w + 2, 4);
      ctx.fillStyle = comboColor();
      ctx.fillRect(VW / 2 - w / 2, 52, w * (comboTimer / COMBO_WINDOW), 3);
    }

    // Meteor shower active flag
    if (meteorShowerT > 0) {
      ctx.textAlign = 'center';
      ctx.font = 'bold 12px -apple-system, sans-serif';
      ctx.fillStyle = '#ff5252';
      ctx.strokeText('☄ METEOR SHOWER', VW / 2, 66);
      ctx.fillText('☄ METEOR SHOWER', VW / 2, 66);
    }

    // lives icons (mini ships) — right aligned, offset for pause button
    const livesX = VW - pad - 60;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'right';
    ctx.font = 'bold 12px -apple-system, sans-serif';
    for (let i = 0; i < lives; i++) {
      const x = livesX - i * 22;
      ctx.save();
      ctx.shadowBlur = 6; ctx.shadowColor = PILOTS[pilotId].color;
      ctx.fillStyle = PILOTS[pilotId].color;
      ctx.beginPath();
      ctx.moveTo(x, 14);
      ctx.lineTo(x + 7, 28);
      ctx.lineTo(x - 7, 28);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    // bombs + fire hint (keyboard players)
    if (!document.body.classList.contains('touch')) {
      ctx.textAlign = 'left';
      ctx.font = 'bold 14px -apple-system, sans-serif';
      const bombText = 'BOMBS ' + bombs + '  [B]';
      ctx.strokeText(bombText, pad, VH - 12);
      ctx.fillStyle = bombs > 0 ? '#ffb24d' : '#666';
      ctx.fillText(bombText, pad, VH - 12);
      ctx.fillStyle = '#7fdcff';
      ctx.textAlign = 'right';
      const fireText = 'FIRE [SPACE]';
      ctx.strokeText(fireText, VW - pad, VH - 12);
      ctx.fillText(fireText, VW - pad, VH - 12);
    }

    // power-up timer bar (rapid/spread)
    if (player && player.powerTime > 0) {
      const w = 120;
      const x = VW / 2 - w / 2;
      const y = 38;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(x - 2, y - 2, w + 4, 8);
      const frac = player.powerTime / 600;
      ctx.fillStyle = player.power === 3 ? '#ff80b3' : '#ffce4d';
      ctx.fillRect(x, y, w * frac, 4);
    }

    // shield + active-buff timer column on the left edge
    drawBuffBar(0, player && player.shieldTime,  600, '#7fdcff', 'SHIELD');
    drawBuffBar(1, player && player.laserTime,   360, '#ff5252', 'LASER');
    drawBuffBar(2, player && player.homingTime,  600, '#5dd66c', 'HOMING');
    drawBuffBar(3, player && player.magnetTime,  900, '#c45fff', 'MAGNET');
    drawBuffBar(4, player && player.slowTime,    360, '#aae6ff', 'SLOW-MO');
    drawBuffBar(5, player && player.wingmenTime, 720, '#ffe066', 'WINGMEN');

    // Mini-boss HP bar
    if (miniBoss && (state === PLAYING || state === WAVE_BANNER)) {
      const w = VW * 0.6;
      const x = VW / 2 - w / 2;
      const y = VH - 50;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(x - 3, y - 3, w + 6, 12);
      ctx.fillStyle = '#ff5252';
      ctx.fillRect(x, y, w * (miniBoss.hp / miniBoss.maxHp), 6);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('MOTHERSHIP', VW / 2, y - 3);
    }

    // Boss HP bar (Zorg)
    if (zorg && (state === PLAYING || state === BOSS || state === WAVE_BANNER)) {
      const w = VW * 0.7;
      const x = VW / 2 - w / 2;
      const y = VH - 30;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(x - 3, y - 3, w + 6, 14);
      ctx.fillStyle = '#7ac010';
      ctx.fillRect(x, y, w * (zorg.hp / zorg.maxHp), 8);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('ZORG', VW / 2, y - 4);
    }

    ctx.restore();
  }

  // Buff bar — vertical column on the left showing each active power-up
  function drawBuffBar(slot, value, max, color, label) {
    if (!value || value <= 0) return;
    const x = 10, y = 60 + slot * 14;
    const w = 90;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x, y, w, 8);
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w * Math.min(1, value / max), 8);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 9px -apple-system, sans-serif';
    ctx.textAlign = 'left';
    ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(0,0,0,0.85)';
    ctx.strokeText(label, x + w + 6, y + 7);
    ctx.fillText(label, x + w + 6, y + 7);
  }

  function drawBanner() {
    if (state !== WAVE_BANNER && state !== VICTORY) return;
    if (bannerTime <= 0) return;
    const fade = Math.min(1, bannerTime / 30);
    ctx.save();
    ctx.globalAlpha = fade;
    ctx.textAlign = 'center';
    ctx.font = 'bold 48px -apple-system, sans-serif';
    ctx.lineWidth = 6; ctx.lineJoin = 'round';
    ctx.strokeStyle = 'rgba(0,0,0,0.85)';
    ctx.strokeText(bannerText, VW / 2, VH / 2 - 6);
    ctx.fillStyle = state === VICTORY ? '#ffe066' : '#7fdcff';
    ctx.fillText(bannerText, VW / 2, VH / 2 - 6);
    ctx.font = 'bold 22px -apple-system, sans-serif';
    ctx.lineWidth = 4;
    ctx.strokeText(bannerSub, VW / 2, VH / 2 + 28);
    ctx.fillStyle = '#fff';
    ctx.fillText(bannerSub, VW / 2, VH / 2 + 28);
    ctx.restore();
  }

  function draw() {
    // black backdrop
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.fillStyle = '#02020a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    applyCamera();
    // letterbox-safe background within logical area
    ctx.fillStyle = '#02020a';
    ctx.fillRect(0, 0, VW, VH);

    drawStars();
    for (const c of bgComets) drawBgComet(c);
    drawPlanets();

    for (const p of powerups)       drawPowerup(p);
    for (const t of turrets)        drawTurret(t);
    for (const m of meteors)        drawMeteor(m);
    for (const k of kamikazes)      drawKamikaze(k);
    for (const u of ufos)           drawUFO(u);
    drawMothership();
    drawZorg();
    if (state === PLAYING || state === BOSS || state === WAVE_BANNER) {
      for (const w of wingmen)      drawWingman(w);
      drawShip();
      drawLaserBeam();
    }
    for (const b of bullets)        drawBullet(b);
    for (const b of enemyBullets)   drawEnemyBullet(b);
    for (const e of explosions)     drawExplosion(e);
    for (const pt of particles)     drawParticle(pt);
    for (const ft of floatingTexts) drawFloatingText(ft);

    drawHUD();
    drawBanner();
  }

  // ───── main loop ─────
  function tick() {
    // banner countdown also runs while waiting
    // Hit-pause: freeze enemy/meteor updates for a handful of frames after a
    // big kill. Player + draw still run so the shot lands visually crisp.
    const paused = hitPauseT > 0;
    if (paused) hitPauseT--;

    if (state === WAVE_BANNER) {
      bannerTime--;
      starScrollT += 1.2;
      updateExplosionsParticlesText();
      updateBgComets();
      updatePlayer();
      updateBullets();
      updateLaser();
      // bosses handle their own entry transition during the banner
      if (!paused) {
        if (zorg)     updateZorg();
        if (miniBoss) updateMothership();
      }
      if (bannerTime <= 0) state = PLAYING;
    } else if (state === PLAYING) {
      starScrollT += 1.2;
      updatePlayer();
      updateBullets();
      updateLaser();
      if (!paused) {
        updateMeteors();
        updateUFOs();
        updateKamikazes();
        updateTurrets();
        updatePowerups();
        updateMeteorShower();
      }
      updateCollisions();
      updateExplosionsParticlesText();
      updateBgComets();
      updateCombo();
      if (!paused) {
        updateWave();
        if (miniBoss) updateMothership();
        if (zorg)     updateZorg();
      }
    } else if (state === DEAD || state === VICTORY) {
      starScrollT += 0.6;
      updateBullets();
      updateMeteors();
      updateUFOs();
      updateKamikazes();
      updateTurrets();
      updateExplosionsParticlesText();
      updateBgComets();
      if (zorg)     updateZorg();
      if (miniBoss) updateMothership();
      if (state === VICTORY && bannerTime > 0) bannerTime--;
    }

    if (shake > 0) shake = Math.max(0, shake - 0.7);

    draw();
  }
  // Driving the loop from rAF directly (rather than from inside tick) means
  // a thrown frame still reschedules — we'd rather log + recover than silently
  // freeze the whole game on a single bad frame.
  function loop() {
    try { tick(); } catch (err) { console.error('meteor-blaster frame error:', err); }
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
